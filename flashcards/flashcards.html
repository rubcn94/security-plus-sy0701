<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards Security+ SY0-701 (382 terminos ALTA+MEDIA)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            color: white;
            font-size: 1.1em;
        }

        .card-container {
            perspective: 1000px;
            margin-bottom: 30px;
        }

        .flashcard {
            width: 100%;
            min-height: 400px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            cursor: pointer;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            min-height: 400px;
            backface-visibility: hidden;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card-front {
            background: white;
        }

        .card-back {
            background: #f8f9fa;
            transform: rotateY(180deg);
        }

        .termino {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
        }

        .prioridad-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .prioridad-ALTA {
            background: #ff6b6b;
            color: white;
        }

        .prioridad-MEDIA {
            background: #ffa500;
            color: white;
        }

        .dominio {
            color: #6c757d;
            font-size: 1.2em;
            margin-bottom: 20px;
        }

        .definicion {
            font-size: 1.2em;
            line-height: 1.6;
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }

        .ejemplos {
            width: 100%;
            text-align: left;
            margin-top: 20px;
        }

        .ejemplos h4 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .ejemplos ul {
            list-style-position: inside;
            color: #555;
        }

        .ejemplos li {
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 25px;
            background: white;
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        .progress {
            background: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            color: #333;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }

        .hint {
            color: white;
            text-align: center;
            margin-top: 20px;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Security+ SY0-701</h1>
            <div class="stats">
                <span id="total-cards">382 flashcards</span>
                <span>|</span>
                <span>220 ALTA + 162 MEDIA</span>
            </div>
        </div>

        <div class="card-container">
            <div class="flashcard" id="flashcard" onclick="flipCard()">
                <div class="card-face card-front">
                    <span class="prioridad-badge" id="prioridad-front"></span>
                    <div class="dominio" id="dominio-front"></div>
                    <div class="termino" id="termino"></div>
                    <p style="color: #6c757d; margin-top: 20px;">Click para ver definicion</p>
                </div>
                <div class="card-face card-back">
                    <span class="prioridad-badge" id="prioridad-back"></span>
                    <div class="dominio" id="dominio-back"></div>
                    <div class="definicion" id="definicion"></div>
                    <div class="ejemplos" id="ejemplos-container"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="previousCard()">Anterior</button>
            <button onclick="randomCard()">Aleatorio</button>
            <button onclick="nextCard()">Siguiente</button>
        </div>

        <div class="progress">
            <strong>Progreso:</strong> <span id="current">1</span> / <span id="total">382</span>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <div class="hint">
            Usa flechas izquierda/derecha para navegar | Espacio para voltear | R para aleatorio
        </div>
    </div>

    <script>
        const flashcards = [{"id": "FC_001", "termino": "CIA_Triad", "pregunta": "Qu es CIA_Triad?", "respuesta": "Tríada de seguridad fundamental: Confidencialidad (solo personas autorizadas acceden), Integridad (datos no modificados sin autorización), Disponibilidad (acceso cuando se necesita)", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_002", "termino": "AAA", "pregunta": "Qu es AAA?", "respuesta": "Authentication (verificar identidad), Authorization (dar permisos), Accounting (registrar acciones). Marco de control de acceso", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_003", "termino": "Zero_Trust", "pregunta": "Qu es Zero_Trust?", "respuesta": "Modelo de seguridad que NO confía en ninguna entidad automáticamente. Verificar siempre, dentro o fuera de la red. 'Never trust, always verify'", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_004", "termino": "Defense_in_Depth", "pregunta": "Qu es Defense_in_Depth?", "respuesta": "Múltiples capas de seguridad. Si una falla, las demás protegen. Concepto de defensa en profundidad", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_005", "termino": "Security_Control_Types", "pregunta": "Qu es Security_Control_Types?", "respuesta": "Preventivo (evita incidentes), Detective (detecta incidentes), Correctivo (corrige tras incidente), Compensatorio (alternativa cuando el control preferido no es viable), Directivo (políticas y procedimientos), Disuasorio (desalienta ataques)", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_006", "termino": "Security_Control_Categories", "pregunta": "Qu es Security_Control_Categories?", "respuesta": "Técnico/Lógico (tecnología/sistemas), Gerencial/Administrativo (políticas/procedimientos), Operacional (personas/procesos diarios), Físico (instalaciones materiales)", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_007", "termino": "AES", "pregunta": "Qu es AES?", "respuesta": "Algoritmo de cifrado simétrico estándar. Claves de 128, 192 o 256 bits. Rápido y seguro", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_008", "termino": "RSA", "pregunta": "Qu es RSA?", "respuesta": "Algoritmo de cifrado asimétrico. Par de claves pública/privada. Usado para cifrado y firmas digitales", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_009", "termino": "DHE", "pregunta": "Qu es DHE?", "respuesta": "Intercambio de claves Diffie-Hellman con claves efimeras temporales. Perfect Forward Secrecy. Nueva clave cada sesion", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_010", "termino": "Hashing", "pregunta": "Qu es Hashing?", "respuesta": "Función criptográfica unidireccional que genera un valor de longitud fija (hash) a partir de datos de cualquier tamaño. NO es reversible", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_011", "termino": "SHA", "pregunta": "Qu es SHA?", "respuesta": "Familia de funciones hash criptográficas. SHA-1 (obsoleto), SHA-2 (SHA-256, SHA-512 - recomendado), SHA-3 (último estándar)", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_012", "termino": "Digital_Signature", "pregunta": "Qu es Digital_Signature?", "respuesta": "Firma digital para verificar autenticidad e integridad de documentos. Usa criptografia asimetrica (firma con clave privada, verifica con publica)", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_013", "termino": "DSA", "pregunta": "Qu es DSA?", "respuesta": "Algoritmo para firmas digitales. Autenticacion, integridad, no repudio. Basado en logaritmo discreto. No para cifrado", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_014", "termino": "ECDSA", "pregunta": "Qu es ECDSA?", "respuesta": "DSA basado en criptografia de curva eliptica. Mas eficiente computacionalmente. Menor tamaño de clave para misma seguridad", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_015", "termino": "PKI", "pregunta": "Qu es PKI?", "respuesta": "Infraestructura de gestión de certificados digitales. Incluye CA (Certificate Authority), RA (Registration Authority), certificados X.509", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_016", "termino": "Certificate", "pregunta": "Qu es Certificate?", "respuesta": "Documento que vincula una clave pública a una identidad. Firmado por una CA. Contiene: titular, clave pública, CA emisora, periodo validez", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_017", "termino": "CA", "pregunta": "Qu es CA?", "respuesta": "Tercera parte confiable que emite, revoca y gestiona certificados digitales. Raiz de confianza en PKI", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_018", "termino": "OCSP", "pregunta": "Qu es OCSP?", "respuesta": "Protocolo para verificar estado de revocacion de certificado en tiempo real. Mas rapido que CRL", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_019", "termino": "TPM", "pregunta": "Qu es TPM?", "respuesta": "Chip criptográfico en placa base para almacenar claves, certificados y realizar operaciones de seguridad. Secure boot, cifrado de disco", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_020", "termino": "FDE", "pregunta": "Qu es FDE?", "respuesta": "Cifrado completo del disco por software. Protege TODOS los datos en reposo", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_021", "termino": "WPA2_WPA3", "pregunta": "Qu es WPA2_WPA3?", "respuesta": "Protocolos de seguridad Wi-Fi. WPA2 usa AES-CCMP. WPA3 añade SAE (mejor proteccion contra fuerza bruta) y cifrado individualizado", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_022", "termino": "SAE", "pregunta": "Qu es SAE?", "respuesta": "Metodo de autenticacion en WPA3 que reemplaza el handshake PSK de WPA2. Resistente a ataques offline de fuerza bruta", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_023", "termino": "802.1X", "pregunta": "Qu es 802.1X?", "respuesta": "Estandar IEEE para control de acceso a red basado en puertos (NAC). Usa EAP para autenticacion. Requiere: Suplicante, Autenticador, Servidor AAA (RADIUS)", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_024", "termino": "MDM", "pregunta": "Qu es MDM?", "respuesta": "Gestion centralizada de dispositivos moviles: configuracion, seguridad, aplicaciones, politicas. Control remoto de smartphones/tablets corporativos", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_025", "termino": "DKIM", "pregunta": "Qu es DKIM?", "respuesta": "Firma digital en cabeceras de email para verificar autenticidad del remitente y que no fue modificado. Usa criptografia asimetrica", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_026", "termino": "DMARC", "pregunta": "Qu es DMARC?", "respuesta": "Politica de autenticacion de email que usa SPF y DKIM. Define que hacer con emails que fallan validacion (none/quarantine/reject)", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_027", "termino": "SPF", "pregunta": "Qu es SPF?", "respuesta": "Record DNS que especifica que servidores pueden enviar email desde un dominio. Previene email spoofing", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_028", "termino": "OpenID_Connect", "pregunta": "Qu es OpenID_Connect?", "respuesta": "Capa de identidad sobre OAuth 2.0. Permite autenticacion federada (Single Sign-On). Devuelve ID token (JWT) con info del usuario", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_029", "termino": "SAML_Features", "pregunta": "Qu es SAML_Features?", "respuesta": "Estandar XML para intercambio de autenticacion/autorizacion entre Identity Provider (IdP) y Service Provider (SP). SSO empresarial", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_030", "termino": "Biometrics_Types", "pregunta": "Qu es Biometrics_Types?", "respuesta": "Autenticacion basada en caracteristicas fisicas/comportamentales. Fisiologica: huella, iris, facial. Comportamental: firma, patron de tecleo, voz", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_031", "termino": "Hardware_Tokens", "pregunta": "Qu es Hardware_Tokens?", "respuesta": "Dispositivos fisicos para autenticacion. Tipos: Key fob (OTP), Security key (FIDO2/U2F), RFID badge, Smart card", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_032", "termino": "Security_Key", "pregunta": "Qu es Security_Key?", "respuesta": "Token de hardware para autenticacion sin contraseña. Soporta FIDO2/U2F/WebAuthn. Resistente a phishing", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_033", "termino": "Password_Policies", "pregunta": "Qu es Password_Policies?", "respuesta": "Reglas de complejidad, longitud, historial, expiracion. Requisitos: minimo caracteres, mayusculas, numeros, simbolos", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_034", "termino": "OTP", "pregunta": "Qu es OTP?", "respuesta": "Contraseña valida para una sola sesion o transaccion. Genera codigo temporal. Componente MFA. Caduca rapidamente", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_035", "termino": "Just_in_Time_Permissions", "pregunta": "Qu es Just_in_Time_Permissions?", "respuesta": "Acceso efimero temporal. Privilegios otorgados solo cuando se necesitan. Se revocan automaticamente tras uso. Reduce superficie de ataque", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_036", "termino": "SHA_3", "pregunta": "Qu es SHA_3?", "respuesta": "Familia de funciones hash criptograficas mas reciente. Mayor seguridad que SHA-2. Algoritmo Keccak", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_037", "termino": "Digital_Certificate", "pregunta": "Qu es Digital_Certificate?", "respuesta": "Documento digital que verifica identidad de individuo/dispositivo/organizacion. Emitido por CA. Contiene clave publica + info del titular", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_038", "termino": "Vishing", "pregunta": "Qu es Vishing?", "respuesta": "Phishing por voz (telefono/VoIP). Atacante llama haciendose pasar por entidad legitima para robar informacion", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_039", "termino": "Pharming", "pregunta": "Qu es Pharming?", "respuesta": "Redireccion de trafico web a sitio falso mediante envenenamiento DNS o modificacion de archivo hosts. Sin interaccion del usuario", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_040", "termino": "MSSP", "pregunta": "Qu es MSSP?", "respuesta": "Proveedor externo especializado en seguridad IT. Ofrece SOC, SIEM, gestion de vulnerabilidades, respuesta a incidentes", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_041", "termino": "STARTTLS", "pregunta": "Qu es STARTTLS?", "respuesta": "Comando para actualizar conexion no cifrada a cifrada con TLS. Usado en SMTP, IMAP, POP3. Puerto 587 para SMTP", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_042", "termino": "CCMP", "pregunta": "Qu es CCMP?", "respuesta": "Protocolo de cifrado en WPA2. Basado en AES. Reemplaza TKIP. Mayor seguridad", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_043", "termino": "Password_Manager", "pregunta": "Qu es Password_Manager?", "respuesta": "Aplicacion que almacena y gestiona contraseñas de forma segura. Cifrado de boveda. Genera contraseñas fuertes. Una contraseña maestra", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_044", "termino": "Dictionary_Attack", "pregunta": "Qu es Dictionary_Attack?", "respuesta": "Ataque de fuerza bruta que usa lista de palabras comunes. Prueba contraseñas probables (diccionario). Mas eficiente que fuerza bruta pura", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_045", "termino": "ML", "pregunta": "Qu es ML?", "respuesta": "Aprendizaje automatico. IA que aprende de datos sin programacion explicita. Deteccion anomalias, threat hunting", "dominio": "Conceptos Generales de Seguridad", "prioridad": "ALTA"}, {"id": "FC_046", "termino": "Threat_Actor", "pregunta": "Qu es Threat_Actor?", "respuesta": "Entidad que representa una amenaza. Tipos: Nation-state (estado), APT (amenaza persistente avanzada), Hacktivist (activismo), Insider (interno), Script kiddie (aficionado)", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_047", "termino": "APT", "pregunta": "Qu es APT?", "respuesta": "Ataque cibernetico sofisticado y prolongado. Bien financiado (nation-states). Objetivo especifico. Persistente en red", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_048", "termino": "Phishing", "pregunta": "Qu es Phishing?", "respuesta": "Ataque de ingeniería social mediante email fraudulento que simula ser legítimo para robar credenciales o instalar malware", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_049", "termino": "Spear_Phishing", "pregunta": "Qu es Spear_Phishing?", "respuesta": "Phishing dirigido a persona o organización específica. Altamente personalizado con información de OSINT", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_050", "termino": "BEC", "pregunta": "Qu es BEC?", "respuesta": "Ataque sofisticado de phishing dirigido a empresas. Suplanta identidad de ejecutivo o proveedor para transferencias fraudulentas", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_051", "termino": "Impersonation", "pregunta": "Qu es Impersonation?", "respuesta": "Hacerse pasar por otra persona u organización legítima para ganar confianza y acceso", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_052", "termino": "Typosquatting", "pregunta": "Qu es Typosquatting?", "respuesta": "Registro de dominios con errores tipograficos de sitios populares. Explota errores de escritura usuarios. Phishing y distribucion malware", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_053", "termino": "Malware", "pregunta": "Qu es Malware?", "respuesta": "Software malicioso diseñado para dañar, explotar o comprometer sistemas. Tipos: virus, gusano, troyano, ransomware, spyware, rootkit", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_054", "termino": "Ransomware", "pregunta": "Qu es Ransomware?", "respuesta": "Malware que cifra archivos de victima. Exige pago (rescate) para clave de descifrado. Doble extorsion: cifrado + amenaza de publicacion", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_055", "termino": "Trojan", "pregunta": "Qu es Trojan?", "respuesta": "Malware disfrazado de software legítimo. NO se auto-replica. Puerta trasera para el atacante", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_056", "termino": "RAT", "pregunta": "Qu es RAT?", "respuesta": "Troyano que permite control remoto completo del sistema comprometido. Acceso backdoor persistente", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_057", "termino": "Worm", "pregunta": "Qu es Worm?", "respuesta": "Malware autorreplicante. Se propaga automaticamente por red sin intervencion humana. Consume recursos de red", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_058", "termino": "Botnet", "pregunta": "Qu es Botnet?", "respuesta": "Red de equipos infectados (zombies) controlados remotamente. Usada para DDoS, spam, cryptomining. Comando y control (C2)", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_059", "termino": "C2", "pregunta": "Qu es C2?", "respuesta": "Servidor que controla malware/bots remotamente. Envía comandos y recibe datos robados", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_060", "termino": "SQL_Injection", "pregunta": "Qu es SQL_Injection?", "respuesta": "Vulnerabilidad que permite inyectar código SQL malicioso en queries. Compromete base de datos", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_061", "termino": "XSS", "pregunta": "Qu es XSS?", "respuesta": "Inyeccion de script malicioso en sitio web confiable. Browser del usuario ejecuta script del atacante. Roba cookies/sesiones", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_062", "termino": "CSRF", "pregunta": "Qu es CSRF?", "respuesta": "Ataque que engaña a usuario para ejecutar acciones no deseadas en sitio donde esta autenticado. Explota confianza del sitio en navegador", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_063", "termino": "RCE", "pregunta": "Qu es RCE?", "respuesta": "Vulnerabilidad que permite ejecutar código arbitrario en sistema remoto. Muy crítica (CVSS 9-10)", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_064", "termino": "XML_Injection", "pregunta": "Qu es XML_Injection?", "respuesta": "Inyeccion de codigo XML malicioso. Manipula parseo de XML. XXE (External Entity) para leer archivos. Ataque a aplicaciones que procesan XML", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_065", "termino": "Directory_Traversal", "pregunta": "Qu es Directory_Traversal?", "respuesta": "Ataque que accede a archivos fuera de directorio web. Usa secuencias \"../\" para subir directorios. Lectura de archivos sensibles del sistema", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_066", "termino": "Zero_Day", "pregunta": "Qu es Zero_Day?", "respuesta": "Vulnerabilidad desconocida por el fabricante. No existe parche. Ventana de 0 días para defenderse", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_067", "termino": "DoS", "pregunta": "Qu es DoS?", "respuesta": "Ataque que satura un servicio para hacerlo inaccesible. Desde una sola fuente", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_068", "termino": "DDoS", "pregunta": "Qu es DDoS?", "respuesta": "Ataque desde múltiples fuentes (botnet) para saturar un servicio y hacerlo inaccesible. Versión distribuida del DoS", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_069", "termino": "Reflected_DDoS", "pregunta": "Qu es Reflected_DDoS?", "respuesta": "Ataque DDoS que usa servidores intermedios para amplificar trafico. Falsifica IP origen (spoofing). Servidores reflejan respuestas a victima", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_070", "termino": "DNS_Spoofing", "pregunta": "Qu es DNS_Spoofing?", "respuesta": "Proporcionar información DNS falsa al resolver para redirigir tráfico a servidor malicioso", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_071", "termino": "MitM", "pregunta": "Qu es MitM?", "respuesta": "Atacante se interpone entre dos partes que se comunican para interceptar/modificar tráfico. También llamado On-Path attack", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_072", "termino": "Session_Hijacking", "pregunta": "Qu es Session_Hijacking?", "respuesta": "Robo de Session ID válido para suplantar usuario autenticado. NO requiere credenciales", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_073", "termino": "Brute_Force", "pregunta": "Qu es Brute_Force?", "respuesta": "Ataque que prueba TODAS las combinaciones posibles de contraseñas hasta encontrar la correcta. Alto uso de recursos", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_074", "termino": "Dictionary_Attack", "pregunta": "Qu es Dictionary_Attack?", "respuesta": "Ataque que prueba contraseñas desde lista predefinida (diccionario) de passwords comunes. Más rápido que brute force", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_075", "termino": "Password_Spraying", "pregunta": "Qu es Password_Spraying?", "respuesta": "Probar POCAS contraseñas comunes contra MUCHAS cuentas. Evita lockout de cuenta individual", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_076", "termino": "Privilege_Escalation", "pregunta": "Qu es Privilege_Escalation?", "respuesta": "Obtener permisos superiores a los asignados inicialmente. Vertical (usuario → admin) u horizontal (usuario → otro usuario)", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_077", "termino": "CVE", "pregunta": "Qu es CVE?", "respuesta": "Sistema de identificacion unica de vulnerabilidades. Formato: CVE-YEAR-NUMBER. Mantenido por MITRE", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_078", "termino": "CVSS", "pregunta": "Qu es CVSS?", "respuesta": "Sistema de puntuación de gravedad de vulnerabilidades. Escala 0.0-10.0. Crítico (9.0-10.0), Alto (7.0-8.9), Medio (4.0-6.9), Bajo (0.1-3.9)", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_079", "termino": "IoC", "pregunta": "Qu es IoC?", "respuesta": "Evidencia forense que indica posible intrusión o actividad maliciosa. Hashes, IPs, dominios, patrones de comportamiento", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_080", "termino": "Input_Validation", "pregunta": "Qu es Input_Validation?", "respuesta": "Validar toda entrada de usuario antes de procesarla. Previene injection, XSS, buffer overflow. Whitelist mejor que blacklist", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_081", "termino": "Error_Handling", "pregunta": "Qu es Error_Handling?", "respuesta": "Manejo seguro de errores sin revelar informacion sensible. Mensajes genericos al usuario, detalles solo en logs internos", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_082", "termino": "Data_Sanitization", "pregunta": "Qu es Data_Sanitization?", "respuesta": "Eliminar/sobrescribir datos de forma permanente. Metodos: Overwriting, Degaussing, Destruccion fisica, Crypto-shredding", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_083", "termino": "False_Negative", "pregunta": "Qu es False_Negative?", "respuesta": "Sistema de seguridad NO detecta amenaza real. Falso sentido de seguridad. MAS PELIGROSO que falso positivo", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_084", "termino": "False_Positive", "pregunta": "Qu es False_Positive?", "respuesta": "Sistema de seguridad alerta sobre actividad normal como amenaza. Genera fatiga de alertas y reduce eficiencia", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_085", "termino": "MITRE_ATT&CK", "pregunta": "Qu es MITRE_ATT&CK?", "respuesta": "Framework de tacticas y tecnicas de adversarios. Base de conocimiento de comportamiento de atacantes. Matriz de TTPs", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_086", "termino": "Attack_Surface", "pregunta": "Qu es Attack_Surface?", "respuesta": "Suma de todos los puntos de vulnerabilidad donde atacante puede interactuar/comprometer sistema. Mayor superficie = mayor riesgo", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_087", "termino": "Threat_Vector", "pregunta": "Qu es Threat_Vector?", "respuesta": "Metodo/ruta que atacante usa para introducir amenaza. Email, malware, drive-by download, ingenieria social", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_088", "termino": "SQLi", "pregunta": "Qu es SQLi?", "respuesta": "Inyeccion de codigo SQL malicioso en campos de entrada para ejecutar comandos no autorizados en base de datos", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_089", "termino": "Memory_Injection", "pregunta": "Qu es Memory_Injection?", "respuesta": "Introducir codigo externo en espacio de memoria de proceso en ejecucion. Tecnica de evasion de AV", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_090", "termino": "Malicious_Update", "pregunta": "Qu es Malicious_Update?", "respuesta": "Malware instalado via actualizacion falsa de software. Vector: codigo sin firmar, canal HTTP, servidor comprometido, supply chain attack", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_091", "termino": "Legacy_Hardware_Vulnerability", "pregunta": "Qu es Legacy_Hardware_Vulnerability?", "respuesta": "Vulnerabilidad principal: falta de actualizaciones de seguridad y parches. Hardware obsoleto sin soporte", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_092", "termino": "VM_Escape", "pregunta": "Qu es VM_Escape?", "respuesta": "Vulnerabilidad de virtualizacion donde activos de una VM acceden/comprometen otra VM. Rompe aislamiento entre VMs", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_093", "termino": "Wireless_Disassociation", "pregunta": "Qu es Wireless_Disassociation?", "respuesta": "Ataque que envia frames de desasociacion falsos. Desconecta clientes de AP. Tipo de DoS inalambrico. Frames de gestion no autenticados", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_094", "termino": "Session_Replay", "pregunta": "Qu es Session_Replay?", "respuesta": "Ataque que captura y reenvía sesion valida. Intercepta trafico autenticado. Replay de tokens o cookies de sesion. Bypass de autenticacion", "dominio": "Amenazas, Vulnerabilidades y Mitigaciones", "prioridad": "ALTA"}, {"id": "FC_095", "termino": "Firewall", "pregunta": "Qu es Firewall?", "respuesta": "Dispositivo o software que filtra tráfico de red según reglas. Tipos: filtrado de paquetes, stateful, capa de aplicación (L7), NGFW", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_096", "termino": "Layer_7_Firewall", "pregunta": "Qu es Layer_7_Firewall?", "respuesta": "Firewall que inspecciona capa de aplicacion OSI. Analiza contenido payload (no solo headers). Filtrado profundo pero mas lento", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_097", "termino": "WAF", "pregunta": "Qu es WAF?", "respuesta": "Firewall específico para proteger aplicaciones web. Filtra tráfico HTTP/HTTPS. Protege contra SQLi, XSS, CSRF", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_098", "termino": "IDS", "pregunta": "Qu es IDS?", "respuesta": "Sistema que DETECTA intrusiones pero NO bloquea. Genera alertas. Tipos: NIDS (red), HIDS (host)", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_099", "termino": "NIDS", "pregunta": "Qu es NIDS?", "respuesta": "Sistema de deteccion de intrusiones a nivel de red. Monitorea trafico sin bloquearlo. Modo pasivo. Genera alertas", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_100", "termino": "IPS", "pregunta": "Qu es IPS?", "respuesta": "Sistema que DETECTA Y BLOQUEA intrusiones en línea (inline). IDS + prevención activa", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_101", "termino": "HIPS", "pregunta": "Qu es HIPS?", "respuesta": "IPS instalado en host individual. Monitorea y bloquea actividad maliciosa en sistema. Respuesta activa a amenazas locales", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_102", "termino": "NIPS", "pregunta": "Qu es NIPS?", "respuesta": "Sistema de prevencion de intrusiones a nivel de red. Modo inline - puede bloquear trafico. Accion proactiva", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_103", "termino": "VPN", "pregunta": "Qu es VPN?", "respuesta": "Túnel cifrado sobre red pública. Conecta sitios remotos o usuarios de forma segura. Protocolos: IPSec, SSL/TLS, WireGuard", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_104", "termino": "Site_to_Site_VPN", "pregunta": "Qu es Site_to_Site_VPN?", "respuesta": "VPN que conecta dos redes completas. Tipicamente entre oficinas. Gateway VPN en cada lado. IPsec comun. Always-on", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_105", "termino": "SASE", "pregunta": "Qu es SASE?", "respuesta": "Framework Gartner. Red + seguridad en servicio cloud unico. SD-WAN + CASB + FWaaS + ZTNA + SWG. Cloud-native", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_106", "termino": "SDN", "pregunta": "Qu es SDN?", "respuesta": "Red definida por software. Separa plano de control de plano de datos. Gestion centralizada via controlador. Programable y flexible", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_107", "termino": "VLAN", "pregunta": "Qu es VLAN?", "respuesta": "Segmentacion logica de red. Divide red fisica en multiples redes virtuales. Aislamiento de broadcast. Seguridad por segmentacion", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_108", "termino": "DMZ", "pregunta": "Qu es DMZ?", "respuesta": "Segmento de red aislado entre Internet y red interna. Aloja servicios públicos (web, email) accesibles desde exterior", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_109", "termino": "ACL", "pregunta": "Qu es ACL?", "respuesta": "Lista de reglas de control de acceso. Filtra trafico por IP, puerto, protocolo. Implementada en routers, switches, firewalls", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_110", "termino": "IEEE_802_1X", "pregunta": "Qu es IEEE_802_1X?", "respuesta": "Estandar de control de acceso de red basado en puerto. Autenticacion antes de acceso a red. Usa EAP. Supplicant-Authenticator-Auth Server", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_111", "termino": "Proxy", "pregunta": "Qu es Proxy?", "respuesta": "Intermediario entre cliente e Internet. Filtra, cachea y anonimiza trafico. Forward o reverse proxy. Control y seguridad", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_112", "termino": "RAS", "pregunta": "Qu es RAS?", "respuesta": "Servicio que proporciona acceso remoto seguro a red. VPN, dial-up, terminal services. Permite trabajo remoto", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_113", "termino": "Air_Gap", "pregunta": "Qu es Air_Gap?", "respuesta": "Aislamiento fisico completo de red. Sistema sin conexion a redes externas. Maxima seguridad por separacion fisica", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_114", "termino": "SIEM", "pregunta": "Qu es SIEM?", "respuesta": "Plataforma centralizada que recopila, correlaciona y analiza logs de múltiples fuentes. Genera alertas de seguridad", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_115", "termino": "EDR", "pregunta": "Qu es EDR?", "respuesta": "Solución que detecta amenazas en endpoints por comportamiento. Permite investigación forense y respuesta remota", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_116", "termino": "NGFW", "pregunta": "Qu es NGFW?", "respuesta": "Firewall avanzado con deep packet inspection, IPS, application awareness, threat intelligence integrada", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_117", "termino": "DLP", "pregunta": "Qu es DLP?", "respuesta": "Sistema que detecta y previene exfiltración/fuga de datos sensibles. Monitoriza datos en reposo, uso y tránsito", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_118", "termino": "RTO", "pregunta": "Qu es RTO?", "respuesta": "Tiempo máximo aceptable de inactividad de un sistema tras un desastre. Cuánto tiempo puede estar caído", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_119", "termino": "RPO", "pregunta": "Qu es RPO?", "respuesta": "Cantidad máxima aceptable de pérdida de datos medida en tiempo. Cuánto dato puedes perder", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_120", "termino": "Backup_3_2_1", "pregunta": "Qu es Backup_3_2_1?", "respuesta": "3 copias de datos, en 2 tipos de medios diferentes, 1 copia offsite (fuera del sitio)", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_121", "termino": "Snapshot", "pregunta": "Qu es Snapshot?", "respuesta": "Captura punto-en-tiempo de VM o volumen. Estado completo en momento especifico. Rollback rapido. NO es backup completo a largo plazo", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_122", "termino": "Replication", "pregunta": "Qu es Replication?", "respuesta": "Copia continua de datos a ubicacion secundaria. Sincrona (RPO=0) o asincrona (RPO>0). Alta disponibilidad y DR", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_123", "termino": "Load_Balancing", "pregunta": "Qu es Load_Balancing?", "respuesta": "Distribución de carga de trabajo entre múltiples servidores para mejorar rendimiento y disponibilidad", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_124", "termino": "Hot_Site", "pregunta": "Qu es Hot_Site?", "respuesta": "Centro de datos de backup completamente operacional con replicación en tiempo real. RTO/RPO mínimos (minutos). MUY costoso", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_125", "termino": "Warm_Site", "pregunta": "Qu es Warm_Site?", "respuesta": "Sitio DR con infraestructura basica. Equipos instalados pero no completamente configurados. RTO medio (horas/dias). Balance costo/tiempo", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_126", "termino": "Cold_Site", "pregunta": "Qu es Cold_Site?", "respuesta": "Sitio DR solo con espacio fisico y servicios basicos. Sin equipos preinstalados. RTO largo (dias/semanas). Opcion mas economica", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_127", "termino": "UPS", "pregunta": "Qu es UPS?", "respuesta": "Sistema de alimentación ininterrumpida. Batería que proporciona energía temporal durante corte eléctrico", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_128", "termino": "Cloud_IaaS", "pregunta": "Qu es Cloud_IaaS?", "respuesta": "Modelo cloud que proporciona infraestructura virtualizada. Usuario gestiona OS, aplicaciones. Proveedor gestiona hardware", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_129", "termino": "Cloud_SaaS", "pregunta": "Qu es Cloud_SaaS?", "respuesta": "Aplicación completa en cloud. Usuario solo consume el servicio. Proveedor gestiona todo", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_130", "termino": "Screened_Subnet", "pregunta": "Qu es Screened_Subnet?", "respuesta": "Subred ligeramente protegida entre Internet y red interna. Servidores publicos en DMZ. Doble firewall tipico. Buffer zone de seguridad", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_131", "termino": "Firewall_Implicit_Deny", "pregunta": "Qu es Firewall_Implicit_Deny?", "respuesta": "Regla por defecto: denegar todo trafico no explicitamente permitido. Ultima regla implicita en ACLs", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_132", "termino": "URL_Scanning", "pregunta": "Qu es URL_Scanning?", "respuesta": "Analisis de URLs en tiempo real para detectar phishing, malware, sitios maliciosos. Reputacion de dominios", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_133", "termino": "DNS_Filtering", "pregunta": "Qu es DNS_Filtering?", "respuesta": "Bloquear resoluciones DNS de dominios maliciosos. Previene acceso a phishing, malware, C&C. Nivel de red", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_134", "termino": "Group_Policy", "pregunta": "Qu es Group_Policy?", "respuesta": "Configuracion centralizada en Active Directory para controlar usuarios/computadoras Windows. Politicas de seguridad, software, scripts", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_135", "termino": "FIM", "pregunta": "Qu es FIM?", "respuesta": "Monitoreo de cambios en archivos criticos. Detecta modificaciones no autorizadas. Hash baseline + comparacion. Alerta cambios sospechosos", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_136", "termino": "MAC_Model", "pregunta": "Qu es MAC_Model?", "respuesta": "Control de acceso basado en clasificacion de seguridad. Sistema operativo impone politicas. Usuario NO puede modificar permisos", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_137", "termino": "PEAP", "pregunta": "Qu es PEAP?", "respuesta": "Protocolo de autenticacion 802.1X. Crea tunel TLS antes de autenticar. Protege credenciales. EAP dentro de TLS", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_138", "termino": "EAP_TLS", "pregunta": "Qu es EAP_TLS?", "respuesta": "EAP Transport Layer Security. Metodo mas seguro 802.1X. Requiere certificados en cliente Y servidor. Mutual authentication", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_139", "termino": "WPA_Enterprise", "pregunta": "Qu es WPA_Enterprise?", "respuesta": "WPA/WPA2/WPA3 con autenticacion 802.1X. Servidor RADIUS. Credenciales individuales por usuario. Para empresas", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_140", "termino": "DAC", "pregunta": "Qu es DAC?", "respuesta": "Control de acceso discrecional. Propietario del recurso decide permisos. Usuarios pueden compartir recursos. Menos restrictivo", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_141", "termino": "Least_Privilege", "pregunta": "Qu es Least_Privilege?", "respuesta": "Principio de minimo privilegio. Usuarios/procesos solo acceso necesario para tarea. Reduce superficie de ataque. Best practice seguridad", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_142", "termino": "Adaptive_Identity", "pregunta": "Qu es Adaptive_Identity?", "respuesta": "Control de acceso Zero Trust dinamico. Considera contexto: identidad, dispositivo, ubicacion, comportamiento. Decisiones de acceso en tiempo real", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_143", "termino": "IPsec", "pregunta": "Qu es IPsec?", "respuesta": "Suite de protocolos para seguridad IP. Cifrado, autenticacion e integridad. VPNs site-to-site. Layer 3 del modelo OSI", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_144", "termino": "PSK", "pregunta": "Qu es PSK?", "respuesta": "Clave secreta compartida previamente entre partes. Usado en WPA/WPA2-Personal. Autenticacion simetrica. Mas simple que 802.1X", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_145", "termino": "GDPR", "pregunta": "Qu es GDPR?", "respuesta": "Reglamento UE de proteccion de datos personales. Derecho privacidad ciudadanos UE. Multas severas por incumplimiento. RGPD en español", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_146", "termino": "Secure_Baseline", "pregunta": "Qu es Secure_Baseline?", "respuesta": "Configuracion estandar de seguridad minima. Template de hardening. Configuraciones y ajustes fundamentales. Punto de partida seguro", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_147", "termino": "Remote_Wipe", "pregunta": "Qu es Remote_Wipe?", "respuesta": "Borrado remoto de datos en dispositivo movil perdido/robado. MDM feature. Protege datos corporativos. Factory reset remoto", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_148", "termino": "Data_Retention_Policy", "pregunta": "Qu es Data_Retention_Policy?", "respuesta": "Politica que especifica cuanto tiempo retener datos antes de eliminarlos. Requisitos legales y compliance. Ciclo de vida de datos", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_149", "termino": "STARTTLS", "pregunta": "Qu es STARTTLS?", "respuesta": "Comando para upgradear conexion plaintext a TLS. Usado en SMTP, IMAP, POP3. Explicit TLS. Puerto estandar + upgrade", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_150", "termino": "SOW", "pregunta": "Qu es SOW?", "respuesta": "Declaracion de trabajo detallada. Describe trabajo a realizar en proyecto. Alcance, entregables, timeline, costo", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_151", "termino": "CCMP", "pregunta": "Qu es CCMP?", "respuesta": "Protocolo cifrado WPA2/WPA3. Basado en AES. Reemplazo de TKIP. Modo contador + autenticacion CBC-MAC", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_152", "termino": "CBC_Mode", "pregunta": "Qu es CBC_Mode?", "respuesta": "Modo cifrado de bloques. Cada bloque XOR con anterior. IV para primer bloque. Popular pero vulnerable a padding oracle", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_153", "termino": "ECB_Mode", "pregunta": "Qu es ECB_Mode?", "respuesta": "Modo cifrado de bloques MAS DEBIL. Cada bloque cifrado independiente. Patrones visibles. NO USAR", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_154", "termino": "AUP", "pregunta": "Qu es AUP?", "respuesta": "Politica de uso aceptable. Reglas de comportamiento para usuarios de sistemas IT. Que esta permitido/prohibido", "dominio": "Arquitectura de Seguridad", "prioridad": "ALTA"}, {"id": "FC_155", "termino": "Static_Code_Analysis", "pregunta": "Qu es Static_Code_Analysis?", "respuesta": "Analisis de codigo fuente sin ejecutarlo. Busca bugs, vulnerabilidades, code smells. SAST. Parte de DevSecOps", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_156", "termino": "Dynamic_Code_Analysis", "pregunta": "Qu es Dynamic_Code_Analysis?", "respuesta": "Analisis de aplicacion en EJECUCION. Detecta vulnerabilidades en runtime. Parte de DAST", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_157", "termino": "Package_Monitoring", "pregunta": "Qu es Package_Monitoring?", "respuesta": "Monitoreo de dependencias de software (bibliotecas, frameworks). Detecta vulnerabilidades conocidas en paquetes terceros", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_158", "termino": "DLP", "pregunta": "Qu es DLP?", "respuesta": "Tecnologia para prevenir fuga de datos sensibles. Monitorea, detecta, bloquea transferencias no autorizadas. Network-based, Endpoint-based, Cloud-based", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_159", "termino": "Signatures", "pregunta": "Qu es Signatures?", "respuesta": "Patrones conocidos de malware/ataques. Usados por antivirus, IDS/IPS. Requiere actualizacion constante. Inefectivo contra zero-day", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_160", "termino": "Orchestration", "pregunta": "Qu es Orchestration?", "respuesta": "Coordinacion y gestion automatizada de multiples tareas y sistemas. Workflow automation complejo. Mas avanzado que automatizacion simple", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_161", "termino": "Automation", "pregunta": "Qu es Automation?", "respuesta": "Automatizacion de tareas repetitivas de seguridad. Scripts, runbooks, respuestas automaticas. Reduce tiempo de respuesta", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_162", "termino": "PCAP", "pregunta": "Qu es PCAP?", "respuesta": "Captura de paquetes de red para analisis. Formato de archivo .pcap. Wireshark, tcpdump. Analisis trafico y troubleshooting", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_163", "termino": "Vulnerability_Scanning", "pregunta": "Qu es Vulnerability_Scanning?", "respuesta": "Escaneo automatizado de vulnerabilidades. Identifica debilidades de seguridad. Nessus, Qualys, OpenVAS", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_164", "termino": "SASE", "pregunta": "Qu es SASE?", "respuesta": "Framework cloud que combina funciones de red (SD-WAN) y seguridad (SWG, CASB, FWaaS, ZTNA) en servicio unico", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_165", "termino": "AUP", "pregunta": "Qu es AUP?", "respuesta": "Politica que define uso aceptable de recursos IT de organizacion. Control directivo que guia comportamiento de usuarios", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_166", "termino": "Red_Team", "pregunta": "Qu es Red_Team?", "respuesta": "Equipo que simula atacantes reales. Pentest ofensivo y realista. Prueba controles de seguridad. Tacticas adversarias", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_167", "termino": "Blue_Team", "pregunta": "Qu es Blue_Team?", "respuesta": "Equipo de defensa. Detecta y responde a ataques. Monitoriza logs y alertas. Defiende contra Red Team", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_168", "termino": "Gray_Box_Testing", "pregunta": "Qu es Gray_Box_Testing?", "respuesta": "Pentest con conocimiento parcial. Informacion limitada del sistema. Mezcla de black-box y white-box. Mas realista que white-box", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_169", "termino": "Active_Reconnaissance", "pregunta": "Qu es Active_Reconnaissance?", "respuesta": "Reconocimiento activo. Interaccion directa con objetivo. Genera trafico detectable. Escaneos, sondeos", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_170", "termino": "Passive_Reconnaissance", "pregunta": "Qu es Passive_Reconnaissance?", "respuesta": "Reconocimiento pasivo. Sin contacto directo con objetivo. Recopilacion de info publica. No genera alertas", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_171", "termino": "Fuzzing", "pregunta": "Qu es Fuzzing?", "respuesta": "Tecnica de testing automatizada. Envia inputs invalidos/aleatorios/inesperados. Busca crashes o comportamiento anormal. Encuentra vulnerabilidades", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_172", "termino": "Code_Signing", "pregunta": "Qu es Code_Signing?", "respuesta": "Firma digital de codigo/software. Verifica autenticidad y integridad. Certificado del desarrollador. Previene modificacion maliciosa", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_173", "termino": "Impossible_Travel", "pregunta": "Qu es Impossible_Travel?", "respuesta": "Indicador de compromiso. Login desde ubicaciones geograficamente imposibles en tiempo corto. Usuario en Madrid y luego 1h despues en Tokio", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_174", "termino": "Missing_Logs", "pregunta": "Qu es Missing_Logs?", "respuesta": "Indicador de compromiso. Ausencia o borrado de logs. Atacantes eliminan evidencia. Gap en logs de auditoria", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_175", "termino": "Incident_Response_Preparation", "pregunta": "Qu es Incident_Response_Preparation?", "respuesta": "Primera fase de IR. Preparacion previa a incidentes. Crear plan IR, entrenar equipo, herramientas listas. Proactividad", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_176", "termino": "Incident_Response_Detection", "pregunta": "Qu es Incident_Response_Detection?", "respuesta": "Segunda fase de IR. Detectar e identificar incidentes. Analizar alcance, impacto y causa raiz. Determinar severidad", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_177", "termino": "Incident_Response_Containment", "pregunta": "Qu es Incident_Response_Containment?", "respuesta": "Tercera fase de IR. Contener amenaza, erradicar malware, recuperar sistemas. Limitar daño y restaurar operaciones", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_178", "termino": "Incident_Response_Post_Incident", "pregunta": "Qu es Incident_Response_Post_Incident?", "respuesta": "Cuarta fase de IR. Actividades tras incidente. Lessons learned, actualizar procedimientos, mejorar defensas. Documentacion", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_179", "termino": "SDLC", "pregunta": "Qu es SDLC?", "respuesta": "Proceso de creacion y mantenimiento de software. Fases: Planificacion, Analisis, Diseño, Implementacion, Testing, Deploy, Mantenimiento", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_180", "termino": "IoC", "pregunta": "Qu es IoC?", "respuesta": "Evidencia forense de actividad maliciosa. Artefactos que indican breach o compromiso. Hash malware, IP C2, dominios maliciosos", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_181", "termino": "MDM", "pregunta": "Qu es MDM?", "respuesta": "Gestion centralizada de dispositivos moviles. Control configuracion, seguridad, apps. Remote wipe. Enforce policies", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_182", "termino": "CVE", "pregunta": "Qu es CVE?", "respuesta": "Sistema de identificacion de vulnerabilidades publicas. ID unico CVE-YEAR-NUMBER. MITRE mantiene base de datos. Referencia estandar", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_183", "termino": "DKIM", "pregunta": "Qu es DKIM?", "respuesta": "Autenticacion de email mediante firma digital. Verifica remitente y integridad mensaje. Clave privada firma, publica en DNS verifica", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_184", "termino": "DMARC", "pregunta": "Qu es DMARC?", "respuesta": "Politica que especifica como manejar emails que fallan SPF/DKIM. Quarantine, Reject o None. Reportes de compliance", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_185", "termino": "OpenID_Connect", "pregunta": "Qu es OpenID_Connect?", "respuesta": "Capa de autenticacion sobre OAuth 2.0. Verifica identidad usuario. ID Token (JWT). SSO moderno para web/mobile", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_186", "termino": "Biometrics", "pregunta": "Qu es Biometrics?", "respuesta": "Autenticacion mediante caracteristicas biologicas o comportamentales. Huella, facial, iris, voz. Algo que eres", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_187", "termino": "Security_Key", "pregunta": "Qu es Security_Key?", "respuesta": "Token hardware de autenticacion. USB/NFC. FIDO2/U2F. Phishing-resistant MFA. Dispositivo fisico para 2FA", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_188", "termino": "IRP", "pregunta": "Qu es IRP?", "respuesta": "Plan documentado de respuesta a incidentes. Describe pasos en cada fase. Roles, responsabilidades, procedimientos. Playbooks", "dominio": "Operaciones de Seguridad", "prioridad": "ALTA"}, {"id": "FC_189", "termino": "BCP", "pregunta": "Qu es BCP?", "respuesta": "Plan para mantener operaciones criticas durante/despues de desastre. Estrategias de continuidad de negocio", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_190", "termino": "DRP", "pregunta": "Qu es DRP?", "respuesta": "Plan para recuperar sistemas IT despues de desastre. Subset de BCP enfocado en tecnologia. RTO/RPO objectives", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_191", "termino": "IRP", "pregunta": "Qu es IRP?", "respuesta": "Plan documentado para responder a incidentes de seguridad. Define roles, procedimientos, comunicacion, escalacion", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_192", "termino": "Incident_Response_Stages", "pregunta": "Qu es Incident_Response_Stages?", "respuesta": "Preparacion → Deteccion/Analisis → Contencion → Erradicacion → Recuperacion → Lecciones Aprendidas (NIST 800-61)", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_193", "termino": "NTP", "pregunta": "Qu es NTP?", "respuesta": "Protocolo sincronizacion de relojes en red. UDP puerto 123. Critico para logs, Kerberos, certificados", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_194", "termino": "ICMP", "pregunta": "Qu es ICMP?", "respuesta": "Protocolo mensajes de error y control IP. Ping, traceroute. Usado para diagnostico red. Puede ser abusado", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_195", "termino": "BYOD", "pregunta": "Qu es BYOD?", "respuesta": "Modelo donde empleados usan dispositivos personales para trabajo. Riesgos seguridad. Require MDM, policies", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_196", "termino": "UEM", "pregunta": "Qu es UEM?", "respuesta": "Gestion unificada de todos endpoints. Moviles, PCs, tablets, IoT, wearables. Evolucion de MDM + EMM", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_197", "termino": "Risk_Exception", "pregunta": "Qu es Risk_Exception?", "respuesta": "Aprobacion formal para NO remediar riesgo identificado. Decision de negocio. Acepta riesgo temporalmente con justificacion. Requiere autorizacion senior", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_198", "termino": "Risk_Mitigation", "pregunta": "Qu es Risk_Mitigation?", "respuesta": "Reducir probabilidad o impacto de riesgo. Implementar controles de seguridad. Estrategia mas comun. No elimina riesgo completamente", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_199", "termino": "MTTR", "pregunta": "Qu es MTTR?", "respuesta": "Tiempo promedio para reparar sistema tras fallo. Metrica de disponibilidad. Incluye deteccion + resolucion. Menor MTTR = mejor", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_200", "termino": "MTBF", "pregunta": "Qu es MTBF?", "respuesta": "Tiempo promedio entre fallos de sistema. Metrica de fiabilidad. Mayor MTBF = mas confiable. Predice disponibilidad", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_201", "termino": "RPO", "pregunta": "Qu es RPO?", "respuesta": "Maxima perdida de datos aceptable. Medido en tiempo. Frecuencia minima de backups. RPO 1 hora = backup cada hora", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_202", "termino": "RTO", "pregunta": "Qu es RTO?", "respuesta": "Tiempo maximo aceptable para restaurar servicio. Downtime maximo tolerable. Define urgencia de recuperacion. Menor RTO = mayor costo", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_203", "termino": "Risk_Transference", "pregunta": "Qu es Risk_Transference?", "respuesta": "Transferir riesgo a tercero. Tipicamente via seguro o contrato. Compartir impacto financiero. No elimina riesgo tecnico", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_204", "termino": "SLA", "pregunta": "Qu es SLA?", "respuesta": "Acuerdo formal de nivel de servicio. Define expectativas y metricas. Uptime, tiempo de respuesta. Penalizaciones por incumplimiento", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_205", "termino": "Tabletop_Exercise", "pregunta": "Qu es Tabletop_Exercise?", "respuesta": "Ejercicio de simulacion de incidente basado en discusion. Participantes discuten respuesta a escenario. Sin ejecucion tecnica. Training de IR", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_206", "termino": "Root_Cause_Analysis", "pregunta": "Qu es Root_Cause_Analysis?", "respuesta": "Analisis de causa raiz. Investigacion profunda de incidente. Identifica causa fundamental (no sintomas). Previene recurrencia", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_207", "termino": "Chain_of_Custody", "pregunta": "Qu es Chain_of_Custody?", "respuesta": "Cadena de custodia de evidencia digital. Documentacion de quien manejo evidencia y cuando. Preserva integridad legal. Forense", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_208", "termino": "RAID_0", "pregunta": "Qu es RAID_0?", "respuesta": "Disk Striping sin redundancia. Datos distribuidos en multiples discos. Mayor rendimiento. SIN tolerancia a fallos. Fallo de 1 disco = perdida total", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_209", "termino": "RAID_5", "pregunta": "Qu es RAID_5?", "respuesta": "Disk Striping con paridad distribuida. Tolera fallo de 1 disco. Buen balance rendimiento/redundancia. Minimo 3 discos", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_210", "termino": "RAID_10", "pregunta": "Qu es RAID_10?", "respuesta": "RAID 1+0. Combinacion de mirroring y striping. Mirrors primero, luego stripes. Alta redundancia y rendimiento. Minimo 4 discos", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_211", "termino": "Hot_Site", "pregunta": "Qu es Hot_Site?", "respuesta": "Sitio DR completamente equipado y operacional. Replica exacta de produccion. RTO minimo (minutos/horas). Costo mas alto", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_212", "termino": "Warm_Site", "pregunta": "Qu es Warm_Site?", "respuesta": "Sitio DR parcialmente equipado. Infraestructura basica disponible. Requiere configuracion y datos. RTO medio (horas/dias). Costo moderado", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_213", "termino": "Cold_Site", "pregunta": "Qu es Cold_Site?", "respuesta": "Sitio DR solo con espacio fisico y servicios basicos. Sin equipos preinstalados. RTO largo (dias/semanas). Menor costo", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_214", "termino": "Snapshot", "pregunta": "Qu es Snapshot?", "respuesta": "Imagen punto-en-tiempo de sistema/datos. Captura estado instantaneo. Restauracion rapida. NO reemplaza backup completo", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_215", "termino": "Replication", "pregunta": "Qu es Replication?", "respuesta": "Copia continua de datos a ubicacion secundaria. Sincrona o asincrona. Alta disponibilidad. Parte de estrategia DR", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_216", "termino": "Risk_Register", "pregunta": "Qu es Risk_Register?", "respuesta": "Documento que identifica, evalua y rastrea riesgos. Lista completa de riesgos con: descripcion, probabilidad, impacto, mitigacion", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_217", "termino": "PCI_DSS", "pregunta": "Qu es PCI_DSS?", "respuesta": "Estandar de seguridad para industria de pagos. Protege datos de tarjetas. 12 requisitos. Obligatorio para procesadores de tarjetas", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_218", "termino": "ISO", "pregunta": "Qu es ISO?", "respuesta": "Organizacion internacional de estandarizacion. Desarrolla estandares globales. ISO 27001 (seguridad info), ISO 9001 (calidad)", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_219", "termino": "CSP", "pregunta": "Qu es CSP?", "respuesta": "Proveedor servicios cloud. Ofrece IaaS, PaaS, SaaS via Internet. AWS, Azure, GCP", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"id": "FC_220", "termino": "SNMP", "pregunta": "Qu es SNMP?", "respuesta": "Protocolo gestion y monitoreo dispositivos de red. Colecta metricas. UDP 161/162. SNMPv3 seguro", "dominio": "Gestin del Programa de Seguridad", "prioridad": "ALTA"}, {"termino": "Gap Analysis", "definicion": "Proceso de identificar diferencias entre el estado actual de seguridad de una organización y el estado deseado/requerido", "ejemplos": ["Comparar seguridad actual con ISO 27001", "Identificar controles faltantes para compliance PCI DSS"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "Honeypot", "definicion": "Sistema trampa que simula ser vulnerable para atraer atacantes y estudiar sus técnicas. Contiene vulnerabilidades aparentes monitorizadas", "ejemplos": ["Servidor SSH falso con credenciales débiles", "Base de datos con datos ficticios", "Detectar técnicas de ataques"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "RC4 (Rivest Cipher 4)", "definicion": "Cifrado de flujo obsoleto. Usado en WEP y SSL antiguo. Vulnerabilidades conocidas. Deprecated", "ejemplos": ["WEP encryption (inseguro)", "SSL/TLS antiguo (prohibido)", "Stream cipher", "Vulnerabilidades Fluhrer-McGrew"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "Modos de Cifrado de Bloque", "definicion": "Formas de aplicar cifrado por bloques. ECB (simple/débil), CBC (encadenado), CFB (feedback), GCM (autenticado), CTR (contador)", "ejemplos": ["ECB: NO usar (patrones visibles)", "CBC: requiere IV", "GCM: cifrado + autenticación", "AES-256-GCM en TLS 1.3"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "ECC (Elliptic Curve Cryptography)", "definicion": "Criptografía de curva elíptica. Seguridad similar a RSA con claves más cortas. Eficiente para IoT y móviles", "ejemplos": ["ECDSA (firma digital)", "ECDHE (intercambio de claves)", "ECC 256-bit = RSA 3072-bit en seguridad"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "ECDHE (Elliptic Curve Diffie-Hellman Ephemeral)", "definicion": "Versión de Diffie-Hellman basada en curvas elípticas con claves efímeras. Más eficiente que DHE tradicional", "ejemplos": ["TLS 1.3 usa ECDHE", "Perfect Forward Secrecy con menor coste computacional"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "HMAC (Hash-based Message Authentication Code)", "definicion": "Combina función hash con clave secreta para verificar autenticidad E integridad del mensaje", "ejemplos": ["HMAC-SHA256 en JWT", "Verificar que mensaje no fue alterado y proviene de quien dice"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "PBKDF2 (Password-Based Key Derivation Function 2)", "definicion": "Algoritmo de key stretching que aplica función hash múltiples veces (iteraciones) para derivar clave desde password. Protege contra brute force", "ejemplos": ["100,000 iteraciones SHA-256", "Almacenamiento seguro de contraseñas", "Alternativas: bcrypt, scrypt, Argon2"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "SAN Certificate (Subject Alternative Name)", "definicion": "Certificado que puede asegurar múltiples dominios/subdominios. Extensión del campo SAN en X.509", "ejemplos": ["Certificado para www.ejemplo.com, mail.ejemplo.com, ftp.ejemplo.com", "Más flexible que wildcard"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "Wildcard Certificate", "definicion": "Certificado que asegura un dominio principal y TODOS sus subdominios de primer nivel usando asterisco (*)", "ejemplos": ["*.ejemplo.com cubre: www.ejemplo.com, mail.ejemplo.com, ftp.ejemplo.com", "NO cubre sub.sub.ejemplo.com"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "Certificado Autofirmado", "definicion": "Certificado NO emitido por CA. La entidad se firma a sí misma. NO confiable por defecto en navegadores. Uso en entornos internos/dev", "ejemplos": ["Servidor de prueba local", "Red interna corporativa", "Navegador muestra advertencia de seguridad"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "CRL (Certificate Revocation List)", "definicion": "Lista de certificados revocados publicada por CA. Actualizada periodicamente. Mas lento que OCSP", "ejemplos": ["Descarga de CRL completa", "Verificacion offline", "Actualizada cada 24-48 horas", "Tamaño puede ser grande"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "HSM (Hardware Security Module)", "definicion": "Dispositivo hardware dedicado para gestión segura de claves criptográficas. Nivel empresarial. FIPS 140-2/3 certified", "ejemplos": ["Almacenar claves raíz de CA", "Firma de transacciones bancarias", "Thales, AWS CloudHSM"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "KDC (Key Distribution Center)", "definicion": "Servidor centralizado que distribuye claves criptográficas y autentica usuarios. Componente principal de Kerberos", "ejemplos": ["Kerberos KDC emite TGT (Ticket Granting Ticket)", "Active Directory usa KDC"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "SED (Self-Encrypting Drive)", "definicion": "Disco duro/SSD con cifrado por hardware integrado. Transparente para el usuario. Más rápido que software", "ejemplos": ["SSD Samsung con cifrado AES-256", "Protección si roban laptop", "Cumplimiento FIPS"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "EFS (Encrypting File System)", "definicion": "Sistema de cifrado a nivel de archivo en Windows NTFS. Cifra archivos/carpetas individuales, NO todo el disco", "ejemplos": ["Cifrar carpeta 'Documentos' en Windows", "Protección por usuario", "Transparente tras autenticación"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "Data Masking (Enmascaramiento)", "definicion": "Ocultar datos sensibles reemplazándolos con caracteres genéricos. Preserva formato pero no contenido real", "ejemplos": ["Mostrar **** en campo de contraseña", "4532-****-****-1234 para número de tarjeta", "Base de datos de prueba con datos enmascarados"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "Tokenización", "definicion": "Reemplazar dato sensible con token/referencia no sensible. Dato real se almacena en bóveda segura separada", "ejemplos": ["Token de pago en lugar de número de tarjeta real", "PCI DSS compliance", "Dato original NO se puede recuperar del token sin acceso a bóveda"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "S/MIME (Secure/Multipurpose Internet Mail Extensions)", "definicion": "Estándar para cifrar y firmar digitalmente emails. Requiere certificados X.509", "ejemplos": ["Email cifrado en Outlook", "Firma digital de correo", "Certificado personal para S/MIME"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "SFTP (SSH File Transfer Protocol)", "definicion": "Protocolo de transferencia de archivos sobre SSH. Cifrado completo. NO es FTP sobre SSL", "ejemplos": ["Puerto 22 (SSH)", "Alternativa segura a FTP", "FileZilla con SFTP"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "LEAP (Lightweight EAP)", "definicion": "Protocolo de autenticacion inalambrica DEPRECADO de Cisco. Vulnerable a ataques de diccionario. Reemplazado por PEAP y EAP-TLS", "ejemplos": ["NO usar en produccion - obsoleto", "Usar WPA2/WPA3 Enterprise con PEAP o EAP-TLS en su lugar"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "SSID (Service Set Identifier)", "definicion": "Nombre de red inalambrica. Puede ocultarse (SSID oculto) pero no es medida de seguridad efectiva", "ejemplos": ["Cambiar SSID por defecto del router", "Ocultar SSID no previene ataques de descubrimiento"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "Site Survey (Wireless)", "definicion": "Analisis de ubicacion para diseño de red inalambrica. Identifica: cobertura, interferencias, potencia de señal optima, ubicacion de APs", "ejemplos": ["Heat map de cobertura Wi-Fi", "Detectar interferencias de 2.4GHz (microondas, Bluetooth)", "Optimizar ubicacion de APs para roaming"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "CAPTCHA", "definicion": "Challenge-Response para distinguir humanos de bots. Previene ataques automatizados (brute force, scraping, spam)", "ejemplos": ["Imagenes distorsionadas con texto", "Seleccionar semaforos en imagenes (reCAPTCHA v2)", "reCAPTCHA v3 analiza comportamiento sin interaccion"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "PEM (Privacy Enhanced Mail)", "definicion": "Formato codificacion Base64 para certificados y claves. Texto ASCII entre headers BEGIN/END. Estandar de facto", "ejemplos": ["-----BEGIN CERTIFICATE-----", "-----END PRIVATE KEY-----", "Base64 encoded", "Formato texto legible"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "Key Fob", "definicion": "Token fisico que genera OTP (One-Time Password) basado en tiempo (TOTP) o contador (HOTP). Factor de autenticacion", "ejemplos": ["RSA SecurID", "Codigo de 6-8 digitos cambia cada 30-60 segundos", "Sincronizado con servidor AAA"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "RFID Badge", "definicion": "Tarjeta con chip RFID para control de acceso fisico. Comunicacion por radiofrecuencia sin contacto", "ejemplos": ["Tarjeta de empleado para puertas", "Frecuencias: 125kHz (LF), 13.56MHz (HF)", "Vulnerable a clonacion y skimming"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "PKI Trust Models", "definicion": "Modelos de confianza en infraestructura de clave publica: Single CA, Hierarchical, Mesh, Web of Trust, Bridge, Hybrid", "ejemplos": ["Hierarchical: root CA + intermediate CAs", "Mesh: cross-certification entre CAs", "Bridge: conectar PKIs separadas"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "EV Certificate (Extended Validation)", "definicion": "Certificado con validacion extendida. Mayor nivel de verificacion de identidad. Mostraba barra verde en navegadores antiguos", "ejemplos": ["Validacion exhaustiva de organizacion", "Usado por bancos y ecommerce", "Mayor confianza del usuario"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "Disinformation", "definicion": "Informacion falsa o engañosa difundida deliberadamente para manipular o engañar. Diferente de misinformacion (no intencional)", "ejemplos": ["Campañas de desinformacion en redes sociales", "Deepfakes", "Propaganda maliciosa"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "Quishing", "definicion": "Phishing mediante codigos QR maliciosos. Victima escanea QR que lleva a sitio phishing o descarga malware", "ejemplos": ["QR falso en email", "QR en parking meter scam", "Redireccion a sitio phishing"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "Watering Hole Attack", "definicion": "Compromiso de sitio web frecuentado por objetivo. Infectar sitio legitimo para atacar a sus visitantes", "ejemplos": ["Infectar sitio de industria especifica", "Comprometer blog tecnico para atacar desarrolladores", "Plataforma: Websites"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "MSP (Managed Service Provider)", "definicion": "Proveedor externo de servicios IT completos. Gestion de infraestructura, soporte, mantenimiento para empresas sin personal IT", "ejemplos": ["Gestion de red y servidores", "Help desk", "Backup y DR", "Monitoreo 24/7"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "PPP (Point-to-Point Protocol)", "definicion": "Protocolo para enlace punto a punto dedicado entre dos dispositivos de red. Autenticacion, cifrado, compresion
