", "ejemplos": ["Conexiones dial-up", "Enlace entre routers", "Autenticacion PAP/CHAP", "Base de PPTP y PPPoE"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "Non-Persistent VDI", "definicion": "Escritorio virtual que revierte a estado original al cerrar sesion. Compartido entre usuarios. Cambios no se guardan", "ejemplos": ["Kioscos publicos", "Call centers", "Usuario cierra sesion → desktop se resetea", "Ahorro de almacenamiento"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "CMS (Content Management System)", "definicion": "Sistema de gestion de contenido web. Simplifica creacion y mantenimiento de sitios web sin codigo", "ejemplos": ["WordPress", "Drupal", "Joomla", "Vulnerabilidades: plugins desactualizados", "Requiere hardening"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "SOW (Statement of Work)", "definicion": "Documento detallado que describe trabajo a realizar en proyecto. Define entregables, cronograma, costos, requisitos", "ejemplos": ["SOW para implementacion de red", "Alcance del proyecto", "Entregables especificos", "Diferente de SLA/MSA"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "TKIP (Temporal Key Integrity Protocol)", "definicion": "Protocolo de cifrado para mejorar WEP. Usado en WPA1. DEPRECADO - reemplazado por CCMP en WPA2", "ejemplos": ["WPA con TKIP (obsoleto)", "Claves temporales por paquete", "Usar WPA2/WPA3 con CCMP/AES"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "GRE (Generic Routing Encapsulation)", "definicion": "Protocolo de tunelizacion para encapsular protocolos de red dentro de IP. Usado en VPNs. NO cifrado por defecto", "ejemplos": ["GRE over IPsec para VPN", "Tunel punto a punto", "Protocolo 47", "Combinar con IPsec para seguridad"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "AIS (Automated Indicator Sharing)", "definicion": "Iniciativa de gobierno USA (DHS) para compartir indicadores de amenazas ciberneticas en tiempo real entre organizaciones", "ejemplos": ["Compartir IoCs entre gobierno y sector privado", "Formato STIX/TAXII", "Programa DHS CISA"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "Key Stretching", "definicion": "Tecnica que incrementa tiempo de calculo para derivar clave. Dificulta ataques de fuerza bruta. Aplica funcion hash multiples veces", "ejemplos": ["PBKDF2", "bcrypt", "scrypt", "Argon2", "10000+ iteraciones", "Combate password cracking"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "Password History", "definicion": "Politica que recuerda N contraseñas previas. Impide reutilizacion de contraseñas antiguas. Mejora seguridad en cambios periodicos", "ejemplos": ["Recordar ultimas 12 contraseñas", "Windows: Store 24 passwords", "No reutilizar ultimas 5 contraseñas"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "Password Expiration", "definicion": "Politica que fuerza cambio de contraseña periodicamente. Caduca tras X dias. Mitiga riesgo de credenciales comprometidas", "ejemplos": ["Cambio cada 90 dias", "Expiracion 60 dias", "NIST ya NO recomienda expiracion automatica", "Cambio solo si compromiso"], "prioridad": "MEDIA", "dominio": "D1"}, {"termino": "Whaling", "definicion": "Spear phishing dirigido específicamente a ejecutivos de alto nivel (C-level)", "ejemplos": ["Fraude al CEO", "BEC (Business Email Compromise) a director financiero"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "Smishing", "definicion": "Phishing mediante SMS. Mensaje de texto con link malicioso o pidiendo información sensible", "ejemplos": ["SMS: 'Su paquete no pudo entregarse, haga clic aquí'", "Mensaje de 'banco' pidiendo verificar tarjeta"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "Vishing", "definicion": "Phishing por voz (llamada telefónica). Atacante se hace pasar por entidad legítima", "ejemplos": ["Llamada de 'soporte Microsoft' diciendo que PC está infectado", "Falso banco pidiendo verificar transacción"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "Pretexting", "definicion": "Técnica de ingeniería social donde atacante crea escenario falso (pretexto) para engañar y obtener información", "ejemplos": ["Llamar haciéndose pasar por IT support pidiendo password", "Crear historia falsa de emergencia para obtener acceso"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "Watering Hole Attack", "definicion": "Comprometen sitio web legítimo que visita el objetivo para infectar a visitantes. Ataque indirecto", "ejemplos": ["Infectar sitio de noticias de industria específica", "Visitantes descargan malware al navegar"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "Logic Bomb", "definicion": "Codigo malicioso que permanece inactivo hasta que se cumple condicion especifica. Entonces ejecuta payload. Dificil de detectar", "ejemplos": ["Activacion en fecha especifica", "Trigger: despido empleado", "Borrar datos si no login 30 dias", "Sabotaje interno"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "Rootkit", "definicion": "Malware que se oculta en el sistema operativo a nivel kernel o boot. Muy difícil de detectar y eliminar", "ejemplos": ["Rootkit en firmware UEFI", "Bootkit que infecta MBR", "Sony BMG rootkit (2005)"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "LDAP Injection", "definicion": "Inyeccion de codigo en consultas LDAP. Manipula filtros de busqueda LDAP. Bypass de autenticacion o extraccion de datos. Similar a SQLi", "ejemplos": ["usuario=*)(uid=*))(|(uid=*", "Bypass login LDAP", "Extraccion de objetos AD", "Input validation + parametrizacion"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "Buffer Overflow", "definicion": "Vulnerabilidad por escribir más datos de los que cabe en buffer de memoria. Permite sobrescribir memoria adyacente y ejecutar código arbitrario", "ejemplos": ["Stack overflow", "Heap overflow", "Explotación de servicio con input sin validar"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "DLL Injection (Inyección DLL)", "definicion": "Técnica para inyectar código malicioso (DLL) en proceso legítimo de Windows. Evasión de detección", "ejemplos": ["Malware inyecta DLL en explorer.exe", "Rootkit usando DLL injection"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "TOC/TOU (Time of Check/Time of Use)", "definicion": "Vulnerabilidad de condicion de carrera. Estado de recurso cambia entre verificacion y uso. Race condition attack", "ejemplos": ["Verificar permisos archivo, luego cambiar archivo antes de usar", "Symbolic link attack", "File system race"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "Domain Hijacking", "definicion": "Apropiacion ilegitima de dominio. Cambio no autorizado de registrante o DNS. Phishing, robo de credenciales del registrar", "ejemplos": ["Robo credenciales GoDaddy", "Transferencia no autorizada a otro registrar", "Cambio de DNS a servidor atacante"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "Bluesnarfing", "definicion": "Acceso no autorizado a dispositivo Bluetooth. Robo de datos (contactos, mensajes, fotos). Explota vulnerabilidades Bluetooth", "ejemplos": ["Robo contactos telefono", "Acceso calendario", "Descarga mensajes SMS", "Vulnerabilidad Bluetooth legacy"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "Wireless Jamming", "definicion": "Ataque DoS que interfiere señal inalámbrica usando ruido en misma frecuencia. Hace inaccesible WiFi/Bluetooth/GPS", "ejemplos": ["Jamming de señal WiFi 2.4GHz", "Bloquear GPS", "Ataque de denegación de servicio físico"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "Pass the Hash", "definicion": "Técnica de autenticación usando hash de contraseña capturado sin necesidad de descifrar. Común en Windows NTLM", "ejemplos": ["Usar hash NTLM para autenticarse sin conocer password en texto claro", "Movimiento lateral en AD"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "Replay Attack", "definicion": "Capturar y reenviar tráfico de autenticación válido para ganar acceso. Mitigación: timestamps, nonces", "ejemplos": ["Capturar token de autenticación y reenviarlo", "Repetir transacción bancaria capturada"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "Downgrade Attack", "definicion": "Forzar uso de protocolo/cifrado más débil y obsoleto para facilitar compromiso", "ejemplos": ["Forzar TLS 1.0 en lugar de TLS 1.3", "SSL stripping a HTTP", "POODLE attack contra SSL 3.0"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "Sideloading", "definicion": "Instalar apps móviles desde fuentes NO oficiales (fuera de App Store/Play Store). Riesgo de malware", "ejemplos": ["Instalar APK desde sitio web", "Apps no verificadas", "Bypass de protecciones de tienda oficial"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "Rooting (Android)", "definicion": "Obtener acceso root/administrativo completo en dispositivo Android. Anula garantía y rompe seguridad", "ejemplos": ["SuperSU", "Magisk", "Acceso total al sistema operativo", "Bypass de restricciones del fabricante"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "Jailbreaking (iOS)", "definicion": "Obtener acceso root en dispositivo iOS eliminando restricciones de Apple. Instalar apps no autorizadas", "ejemplos": ["Cydia", "Acceso a filesystem", "Instalar apps fuera de App Store"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "Firmware", "definicion": "Software embebido en chip hardware. Controla funciones de bajo nivel del dispositivo. Difícil de actualizar", "ejemplos": ["BIOS/UEFI", "Firmware de router", "Firmware de SSD", "Rootkits pueden infectar firmware"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "Degaussing", "definicion": "Eliminar datos de medios magneticos (HDD, cintas) usando campo magnetico intenso. Destruye datos y hace medio inutilizable", "ejemplos": ["Degausser para HDDs antes de desechar", "NO funciona en SSDs (usar destruccion fisica)", "Certificacion de sanitizacion"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "SCAP (Security Content Automation Protocol)", "definicion": "Suite de especificaciones para automatizar gestion de vulnerabilidades, medicion de configuracion, compliance. Incluye CVE, CVSS, CCE, CPE", "ejemplos": ["SCAP scanners (Nessus, OpenSCAP)", "Validacion automatica de configuraciones contra baseline", "Integracion con SIEM"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "Image-Based Threat Vectors", "definicion": "Amenazas mediante imagenes: Steganography (ocultar datos), Deepfakes (manipulacion), Malware-embedded images", "ejemplos": ["Steganografia en PNG", "Deepfake de CEO para BEC", "Exploit en JPEG", "Brand impersonation con logos"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "Race Condition", "definicion": "Vulnerabilidad donde resultado depende de secuencia/timing de eventos. Acceso concurrente a recurso compartido causa comportamiento inesperado", "ejemplos": ["TOC/TOU (Time-of-Check/Time-of-Use)", "Dos threads modifican variable simultaneamente", "Sincronizacion incorrecta"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "IV Attack", "definicion": "Ataque contra cifrado WEP. Explota debilidad de Initialization Vector (IV) de 24 bits. Colecta IVs para crackear clave WEP", "ejemplos": ["airodump-ng captura IVs", "aircrack-ng crackea WEP", "40000-85000 IVs necesarios", "WEP obsoleto"], "prioridad": "MEDIA", "dominio": "D2"}, {"termino": "HIDS (Host-based IDS)", "definicion": "IDS instalado en host individual. Monitoriza logs, filesystem, procesos del sistema local", "ejemplos": ["OSSEC", "Detecta cambios no autorizados en archivos de sistema"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "Remote Access VPN (Client-to-Site)", "definicion": "VPN para usuarios individuales que conectan a red corporativa desde ubicación remota. Requiere cliente VPN", "ejemplos": ["Teletrabajo con cliente OpenVPN", "SSL VPN via navegador"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "Split Tunnel VPN", "definicion": "VPN que permite tráfico simultáneo por VPN (corporativo) y directo a Internet (no corporativo). Ahorra ancho de banda pero menos seguro", "ejemplos": ["Tráfico a red corporativa via VPN, Netflix directo a Internet", "Conserva bandwidth de empresa"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "Full Tunnel VPN", "definicion": "TODO el tráfico pasa por VPN, incluso Internet. Más seguro pero consume más ancho de banda corporativo", "ejemplos": ["Todo el tráfico inspeccionado por firewall corporativo", "Más control de seguridad"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "IPSec", "definicion": "Suite de protocolos para VPN a nivel IP. Modos: transporte (solo payload), túnel (paquete completo). Componentes: AH (autenticación), ESP (cifrado)", "ejemplos": ["Site-to-site VPN corporativa", "IKE para negociación de claves", "ESP para confidencialidad"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "IKE (Internet Key Exchange)", "definicion": "Protocolo para establecer conexión segura e intercambiar claves en IPSec VPN. Fase 1: autenticación, Fase 2: negociación de claves de sesión", "ejemplos": ["IKEv2 más rápido y seguro que IKEv1", "Establecer SA (Security Association) en IPSec"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "ESP (Encapsulating Security Payload)", "definicion": "Componente de IPSec que proporciona CONFIDENCIALIDAD (cifrado), integridad y autenticación del payload", "ejemplos": ["ESP en modo túnel cifra todo el paquete IP", "Protocolo 50"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "IPSec Tunnel Mode", "definicion": "Modo IPSec que cifra TODO el paquete original (header + payload) y añade nuevo header IP. Usado en VPN site-to-site", "ejemplos": ["VPN entre oficinas", "Paquete completo protegido"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "SSL VPN", "definicion": "VPN basada en SSL/TLS. Acceso mediante navegador web (clientless) o cliente ligero. Más fácil de usar que IPSec para usuarios remotos", "ejemplos": ["Acceso remoto sin cliente dedicado", "Portal web corporativo seguro", "Cisco AnyConnect"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "VLSM (Variable Length Subnet Mask)", "definicion": "Subredes de diferentes tamaños en misma red. Uso eficiente de IPs. Permite subnetting flexible. Optimiza espacio de direcciones", "ejemplos": ["/24 para usuarios (254 hosts)", "/30 para enlaces punto-a-punto (2 hosts)", "Subnetting eficiente"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "Implicit Deny (Denegación Implícita)", "definicion": "Regla por defecto en ACL/firewall: denegar TODO lo que no esté explícitamente permitido. Principio de seguridad", "ejemplos": ["Última regla invisible: deny any any", "Whitelist approach", "Más seguro que permit by default"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "NAC (Network Access Control)", "definicion": "Control de acceso a la red a nivel de puerto. Verifica cumplimiento de seguridad antes de permitir acceso. Protocolo: 802.1X", "ejemplos": ["Verificar antivirus actualizado antes de dar acceso", "BYOD con verificación de políticas", "Cisco ISE"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "PAC (Proxy Auto-Configuration)", "definicion": "Archivo script que define como navegadores seleccionan proxy. Reglas automaticas de enrutamiento web. Formato JavaScript", "ejemplos": ["proxy.pac file", "function FindProxyForURL()", "DIRECT vs PROXY rules", "Automatic proxy selection"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "Port Mirroring (Duplicacion de puertos)", "definicion": "Copia trafico de puerto(s) a puerto monitor. Permite analisis pasivo de red. SPAN port. Usado para IDS, analisis trafico", "ejemplos": ["SPAN port en Cisco", "Mirror port 1-10 to port 24", "IDS monitoring", "Packet capture sin interrupcion"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "Containerización", "definicion": "Empaquetar aplicación y dependencias en unidad autocontenida (container) que corre aislada. Más ligero que VM", "ejemplos": ["Docker", "Kubernetes", "Microservicios en containers", "Aislamiento de aplicaciones"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "Virtualización", "definicion": "Ejecutar múltiples sistemas operativos virtuales (VMs) en un host físico mediante hypervisor", "ejemplos": ["VMware ESXi", "Hyper-V", "VirtualBox", "Consolidación de servidores"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "Sandboxing", "definicion": "Entorno aislado para ejecutar código sospechoso sin riesgo para sistema principal. Análisis seguro de malware", "ejemplos": ["Ejecutar archivo sospechoso en VM desechable", "Cuckoo Sandbox", "Navegador en sandbox"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "SOAR (Security Orchestration, Automation and Response)", "definicion": "Plataforma que automatiza respuesta a incidentes mediante playbooks. Orquesta múltiples herramientas de seguridad", "ejemplos": ["Playbook de phishing: detectar → cuarentenar email → bloquear dominio → notificar usuario", "Cortex XSOAR, Splunk Phantom"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "UTM (Unified Threat Management)", "definicion": "Dispositivo all-in-one que combina firewall, IPS, antivirus, anti-spam, VPN, filtrado web en una sola solución", "ejemplos": ["Fortinet FortiGate", "Sophos UTM", "Seguridad completa para PYMES"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "SWG (Secure Web Gateway)", "definicion": "Proxy avanzado que filtra tráfico web malicioso. Protege navegación: anti-malware, filtrado URL, DLP, inspección SSL", "ejemplos": ["Zscaler", "Filtrar categorías de sitios", "Bloquear descarga de malware", "Cloud-based proxy"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "CASB (Cloud Access Security Broker)", "definicion": "Intermediario de seguridad entre usuarios y aplicaciones cloud. Visibilidad, DLP, compliance, threat protection en SaaS", "ejemplos": ["Controlar uso de Dropbox/OneDrive", "DLP en Office 365", "Detectar shadow IT"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "SNMP (Simple Network Management Protocol)", "definicion": "Protocolo para gestionar y monitorizar dispositivos de red. Versiones: v1/v2c (inseguras), v3 (cifrada)", "ejemplos": ["Monitorizar CPU/memoria de router", "SNMPv3 con autenticación", "Puerto 161/162"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "Journaling (Llevar un diario)", "definicion": "Registro de cambios antes de aplicarlos. Filesystem journaling. Recuperacion tras crash. Integridad de datos garantizada", "ejemplos": ["ext4 journal", "NTFS journal", "Database WAL", "Previene corrupcion tras fallo"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "RAID (Redundant Array of Independent Disks)", "definicion": "Configuración de múltiples discos para redundancia y/o rendimiento. Niveles: 0 (striping), 1 (mirroring), 5 (striping + paridad), 10 (mirror + stripe)", "ejemplos": ["RAID 0: rendimiento, NO redundancia", "RAID 1: espejo para tolerancia a fallos", "RAID 5: balance rendimiento/redundancia (mín 3 discos)", "RAID 10: máximo rendimiento y redundancia (mín 4 discos)"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "Tabletop Exercise", "definicion": "Simulacro de mesa donde equipo discute respuesta a escenario hipotético de incidente. NO es práctica real", "ejemplos": ["Discutir qué hacer ante ransomware", "Revisión de IRP sin ejecutar acciones", "Identificar gaps en procedimientos"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "Simulation (Ejercicio de simulación)", "definicion": "Ejercicio realista que simula ataque real para probar respuesta. Más completo que tabletop", "ejemplos": ["Simular phishing real", "Red team vs Blue team", "Ejecutar acciones de respuesta"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "Backup Generator (Generador de Respaldo)", "definicion": "Generador electrico que arranca cuando falla alimentacion principal. Diesel/gas. Autonomia horas/dias. Complementa UPS", "ejemplos": ["Generador diesel datacenter", "Arranque automatico 30 seg", "Tanque 24-48h autonomia", "Testing mensual requerido"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "PaaS (Platform as a Service)", "definicion": "Plataforma de desarrollo en cloud. Proveedor gestiona OS y runtime. Usuario solo desarrolla aplicación", "ejemplos": ["Heroku", "Google App Engine", "Azure App Service"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "CSP (Cloud Service Provider)", "definicion": "Proveedor de servicios cloud que ofrece infraestructura, plataforma o software en modelo serverless/cloud", "ejemplos": ["AWS", "Azure", "Google Cloud", "Gestiona infraestructura para serverless"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "Hybrid Cloud", "definicion": "Combinación de cloud público, privado y/o on-premises. Datos/apps pueden moverse entre entornos", "ejemplos": ["Datos sensibles on-prem, aplicaciones en public cloud", "Burst a cloud en picos de demanda"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "VPC (Virtual Private Cloud)", "definicion": "Red privada virtual aislada dentro de cloud público. Control completo sobre red (subnets, routing, gateways)", "ejemplos": ["AWS VPC", "Azure Virtual Network", "Segmentación lógica en cloud"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "Agent-Based Filtering", "definicion": "Filtrado web mediante agente instalado en endpoint. Funciona incluso fuera de red corporativa. Control de contenido en laptop remota", "ejemplos": ["Software de filtrado web en laptop corporativa", "Politicas aplicadas localmente", "Alternativa a proxy centralizado"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "SELinux (Security-Enhanced Linux)", "definicion": "Implementacion de Mandatory Access Control (MAC) en Linux. Politicas de seguridad a nivel kernel. Confina procesos", "ejemplos": ["Modos: Enforcing (bloquea), Permissive (alerta), Disabled", "Contextos de seguridad en archivos/procesos", "Politicas targeted/strict"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "IMAPS (IMAP over SSL/TLS)", "definicion": "Protocolo de email cifrado. Puerto 993/TCP. IMAP con capa SSL/TLS para confidencialidad", "ejemplos": ["Configurar cliente email con IMAPS puerto 993", "Alternativa segura a IMAP puerto 143", "Cifrado de credenciales y emails"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "POP3S (POP3 over SSL/TLS)", "definicion": "Protocolo de email cifrado. Puerto 995/TCP. POP3 con capa SSL/TLS", "ejemplos": ["Puerto 995 vs POP3 puerto 110", "Descarga de emails con cifrado", "Menos usado que IMAPS"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "RuBAC (Rule-Based Access Control)", "definicion": "Control de acceso basado en reglas. Combina multiples condiciones: tiempo, ubicacion, tipo de dispositivo, etc.", "ejemplos": ["Permitir acceso solo de 8am-6pm", "Bloquear acceso desde IPs fuera del pais", "ACLs de firewall son tipo RuBAC"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "ABAC (Attribute-Based Access Control)", "definicion": "Control de acceso basado en atributos de: usuario, recurso, entorno. Politicas dinamicas y granulares", "ejemplos": ["Permitir acceso si: departamento=HR AND ubicacion=oficina AND hora_laboral=true", "AWS IAM policies", "XACML standard"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "Time-of-Day Restrictions", "definicion": "Limitar acceso a sistemas/recursos basado en horario. Parte de RuBAC", "ejemplos": ["Acceso a sistema nominas solo 8am-6pm", "Deshabilitar cuentas fuera de horario laboral", "GPO con restricciones horarias"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "EAP-TTLS", "definicion": "EAP Tunneled TLS. Similar a PEAP pero mas flexible. Tunel TLS para autenticacion. Soporta metodos legacy dentro de tunel", "ejemplos": ["EAP-TTLS/PAP", "Certificado solo en servidor", "Alternativa a PEAP", "Mayor compatibilidad que PEAP"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "Clearance Levels", "definicion": "Niveles de autorizacion de seguridad. Clasificacion jerarquica. Gobierno/militar. Sujeto debe tener clearance >= clasificacion objeto", "ejemplos": ["Top Secret", "Secret", "Confidential", "Unclassified", "Need-to-know", "Modelo Bell-LaPadula"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "Geofencing", "definicion": "Perimetro virtual geografico. Reglas basadas en ubicacion GPS. Permite/bloquea acceso segun localizacion. Control de acceso contextual", "ejemplos": ["Acceso solo desde oficina", "Bloquear login fuera del pais", "MDM geofencing", "Alertas salida de zona"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "Honeynet", "definicion": "Red de honeypots interconectados. Simula red completa de organizacion. Atrae atacantes para estudiar TTPs. Investigacion de amenazas", "ejemplos": ["Red falsa con servidores, workstations, routers falsos", "Monitoreo completo de ataques", "Research de malware"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "Honeytoken", "definicion": "Dato falso usado como trampa. Alerta cuando se accede. Credenciales falsas, archivos señuelo. Deteccion de breach", "ejemplos": ["Credenciales falsas en archivo", "Entrada DB ficticia", "Fake API key", "Email señuelo", "Alerta si se usa"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "IPsec Transport Mode", "definicion": "Modo IPsec que cifra solo payload (datos). Header IP original sin cifrar. Usado host-to-host. Menos overhead que Tunnel", "ejemplos": ["Comunicacion host a host", "No modifica IP header", "ESP transport", "Menor overhead que tunnel mode"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "Data Masking (Enmascaramiento de datos)", "definicion": "Ocultar datos sensibles reemplazandolos con caracteres. Protege datos en pantalla. No modifica datos originales en BD", "ejemplos": ["****1234 (numero tarjeta)", "Asteriscos en password field", "XXX-XX-1234 (SSN)", "Ocultar PII en UI"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "EFS (Encrypting File System)", "definicion": "Sistema de cifrado de archivos de Windows. Cifrado a nivel de archivo/carpeta. Transparente para usuario. Basado en certificados usuario", "ejemplos": ["Cifrar carpeta Mis Documentos", "EFS en NTFS", "Certificado usuario para clave", "Data at rest encryption"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "Split Tunneling", "definicion": "VPN que permite trafico simultaneo por VPN y red publica. Trafico corporativo via VPN, Internet directo. Ahorra ancho de banda", "ejemplos": ["Acceso recursos empresa via VPN, Netflix via ISP", "Reduce latencia Internet", "Riesgo: bypass VPN security"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "CAPTCHA", "definicion": "Test para distinguir humanos de bots. Desafio-respuesta visual/audio. Previene automatizacion. reCAPTCHA de Google popular", "ejemplos": ["Seleccionar semaforos en imagenes", "Escribir texto distorsionado", "reCAPTCHA v3 (invisible)", "Anti-bot protection"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "Degaussing (Desmagnetizacion)", "definicion": "Eliminacion de datos mediante desmagnetizacion de medios magneticos. Campo magnetico fuerte borra datos. Destruye disco para reutilizacion", "ejemplos": ["Degausser para HDDs", "Desmagnetizador cintas magneticas", "Inutiliza disco tras proceso", "NO funciona en SSD"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "Non-Persistent VDI", "definicion": "VDI que resetea a estado original tras cada sesion. Escritorio compartido entre usuarios. No guarda cambios. Mas seguro", "ejemplos": ["Escritorio reset al logout", "Comparte golden image", "Mas economico que persistent", "Ideal para task workers"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "CMS (Content Management System)", "definicion": "Sistema gestion de contenido web. Crear y mantener sitios web sin codigo. WordPress, Drupal, Joomla", "ejemplos": ["WordPress", "Drupal", "Joomla", "Vulnerabilidades si no actualizado", "Plugins riesgosos"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "SMTPS (SMTP Secure)", "definicion": "SMTP sobre SSL/TLS implícito. Puerto 465. Deprecated en favor de STARTTLS. Cifrado desde inicio conexion", "ejemplos": ["Puerto 465", "SSL/TLS desde inicio", "Deprecated (usar STARTTLS)", "Cifrado email submission"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "TKIP (Temporal Key Integrity Protocol)", "definicion": "Protocolo seguridad WPA1. Mejora WEP. Claves temporales por paquete. Obsoleto (usar CCMP/WPA2)", "ejemplos": ["WPA con TKIP", "Mejor que WEP pero obsoleto", "Vulnerabilidades conocidas", "Usar WPA2/CCMP"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "GRE (Generic Routing Encapsulation)", "definicion": "Protocolo tunelizacion Cisco. Encapsula diversos protocolos de capa 3. VPN site-to-site. NO cifra (usar con IPsec)", "ejemplos": ["GRE tunnel Cisco", "Encapsula IP, IPv6, IPX", "GRE over IPsec para cifrado", "IP protocol 47"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "AIS (Automated Indicator Sharing)", "definicion": "Iniciativa DHS para compartir indicadores de amenazas en tiempo real. Gobierno + sector privado. STIX/TAXII", "ejemplos": ["US-CERT AIS", "STIX format", "TAXII transport", "Threat intel sharing", "Indicadores IoC automaticos"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "CTR (Counter Mode)", "definicion": "Modo cifrado que convierte block cipher en stream cipher. Usa contador + IV. Paralelizable. No padding", "ejemplos": ["AES-CTR", "Paralelizable (rapido)", "No padding needed", "GCM usa CTR", "Nonce/counter unico critico"], "prioridad": "MEDIA", "dominio": "D3"}, {"termino": "TAXII (Trusted Automated Exchange of Intelligence Information)", "definicion": "Protocolo para compartir threat intelligence. Transporte de datos STIX. APIs para intercambio automatizado de IoCs", "ejemplos": ["TAXII server recibe feeds de IoCs", "Integrar con SIEM/firewall", "Formato STIX para datos de amenazas"], "prioridad": "MEDIA", "dominio": "D4"}, {"termino": "Dark Web", "definicion": "Red overlay anonima (Tor, I2P). Requiere software especial. Usado para: anonimato, mercados ilegales, leaks de datos", "ejemplos": ["Tor Browser", "Dominios .onion", "Monitoreo de credenciales filtradas", "Threat intelligence de foros de hackers"], "prioridad": "MEDIA", "dominio": "D4"}, {"termino": "Bug Bounty", "definicion": "Programa de recompensas por descubrir vulnerabilidades. Researchers eticos reportan bugs a cambio de pago", "ejemplos": ["HackerOne", "Bugcrowd", "Programas de Google, Microsoft, Apple", "Responsible disclosure"], "prioridad": "MEDIA", "dominio": "D4"}, {"termino": "SNMP (Simple Network Management Protocol)", "definicion": "Protocolo de gestion de dispositivos de red. Puertos 161 (agent), 162 (trap). Versiones: v1/v2c (inseguros), v3 (cifrado)", "ejemplos": ["Monitoreo de routers/switches", "MIB (Management Information Base)", "SNMPv3 con autenticacion y cifrado", "Community strings en v1/v2c"], "prioridad": "MEDIA", "dominio": "D4"}, {"termino": "Technical Debt", "definicion": "Costo implicito de trabajo adicional futuro por soluciones rapidas/suboptimas. En seguridad: sistemas legacy sin parches, workarounds", "ejemplos": ["Sistema Windows Server 2008 sin soporte", "Hardcoded credentials pendientes de refactorizar", "Configuraciones temporales que quedaron permanentes"], "prioridad": "MEDIA", "dominio": "D4"}, {"termino": "E-Discovery (Electronic Discovery / Descubrimiento Electronico)", "definicion": "Identificar, recopilar y producir ESI (Electronically Stored Information) para litigio. Proceso legal forense digital", "ejemplos": ["Email discovery en lawsuit", "Forensic collection", "Legal hold", "Chain of custody", "Produccion de evidencia digital"], "prioridad": "MEDIA", "dominio": "D4"}, {"termino": "Metadata (Metadatos)", "definicion": "Datos que describen otros datos. Info sobre archivo sin ser contenido. Autor, fecha creacion, modificacion, ubicacion GPS en fotos", "ejemplos": ["EXIF en fotos (GPS, camara)", "Autor documento Word", "Email headers", "Timestamp archivos", "HTML meta tags"], "prioridad": "MEDIA", "dominio": "D4"}, {"termino": "XML (eXtensible Markup Language)", "definicion": "Lenguaje de marcado para estructurar datos en formato legible para humanos y maquinas. Usado en configuraciones, APIs, SAML", "ejemplos": ["SAML assertions", "Archivos de configuracion", "SOAP web services", "Vulnerable a XXE (XML External Entity)"], "prioridad": "MEDIA", "dominio": "D4"}, {"termino": "JSON (JavaScript Object Notation)", "definicion": "Formato ligero de intercambio de datos. Legible para humanos. Basado en sintaxis JavaScript. Alternativa a XML", "ejemplos": ["APIs REST", "Archivos de configuracion", "Mas simple que XML", "Pares clave-valor"], "prioridad": "MEDIA", "dominio": "D4"}, {"termino": "CBC (Cipher Block Chaining)", "definicion": "Modo de cifrado de bloques que encadena bloques. Cada bloque cifrado depende del anterior. Usa IV (Initialization Vector)", "ejemplos": ["AES-CBC", "Requiere IV aleatorio", "Padding oracle attacks", "Cifrado secuencial (no paralelo)"], "prioridad": "MEDIA", "dominio": "D4"}, {"termino": "CTR (Counter Mode)", "definicion": "Modo de cifrado que combina contador unico con clave para generar bloques pseudoaleatorios. Permite paralelizacion", "ejemplos": ["AES-CTR", "Cifrado paralelo", "Convierte block cipher en stream cipher", "No requiere padding"], "prioridad": "MEDIA", "dominio": "D4"}, {"termino": "Purple Team", "definicion": "Colaboracion entre Red y Blue Team. Comparten conocimientos. Mejoran defensas mediante feedback. No es equipo separado", "ejemplos": ["Red Team explica tecnicas usadas", "Blue Team mejora deteccion", "Sesiones de feedback", "Threat emulation conjunta"], "prioridad": "MEDIA", "dominio": "D4"}, {"termino": "Normalization", "definicion": "Proceso de convertir datos a formato estandar. En SIEM: unificar logs de multiples fuentes. Facilita correlacion y analisis", "ejemplos": ["Timestamp en UTC", "IP en formato estandar", "Campos comunes (src_ip, dst_ip)", "SIEM parsea logs diversos"], "prioridad": "MEDIA", "dominio": "D4"}, {"termino": "Concurrent Session Usage", "definicion": "Indicador de compromiso. Mismo usuario logueado simultaneamente en multiples ubicaciones. Posible robo de credenciales", "ejemplos": ["Usuario en NYC y Tokyo simultaneamente", "Alerta SIEM sesion duplicada", "Indicador de account sharing o compromiso"], "prioridad": "MEDIA", "dominio": "D4"}, {"termino": "Out-of-Cycle Logging", "definicion": "Registros fuera del ciclo normal. Logs en horarios inusuales. Actividad fuera de horario laboral. Indicador de actividad sospechosa", "ejemplos": ["Admin login 3am domingo", "Backup ejecutado horario no planificado", "Script cron fuera de schedule"], "prioridad": "MEDIA", "dominio": "D4"}, {"termino": "ARO (Annualized Rate of Occurrence)", "definicion": "Frecuencia estimada anual de amenaza. Cuantas veces al año ocurre incidente. Calculo de riesgo: SLE x ARO = ALE", "ejemplos": ["Ransomware: ARO = 0.5 (cada 2 años)", "Inundacion: ARO = 0.1 (cada 10 años)", "ALE = SLE x ARO"], "prioridad": "MEDIA", "dominio": "D4"}, {"termino": "Right to be Forgotten (Derecho a ser Olvidado)", "definicion": "Derecho GDPR de solicitar eliminacion de datos personales. Derecho de supresion. Eliminar info de busquedas y fuentes publicas", "ejemplos": ["Eliminar datos de Google Search", "Delete cuenta y datos personales", "GDPR Article 17", "Excepciones legales aplican"], "prioridad": "MEDIA", "dominio": "D4"}, {"termino": "User Onboarding (Incorporacion de Usuario)", "definicion": "Proceso de añadir nuevo empleado a sistemas. Crear cuentas, asignar permisos, hardware, training. Checklist de incorporacion", "ejemplos": ["Crear cuenta AD", "Asignar laptop", "Configurar email", "Access card", "Security training", "Sign NDA"], "prioridad": "MEDIA", "dominio": "D4"}, {"termino": "User Offboarding (Baja de Usuario)", "definicion": "Proceso cuando empleado deja empresa. Revocar accesos, recuperar activos, exit interview. Checklist de despido", "ejemplos": ["Disable AD account", "Recuperar laptop y access card", "Revoke VPN", "Exit interview", "Return company assets"], "prioridad": "MEDIA", "dominio": "D4"}, {"termino": "Data Processor (Procesador de Datos)", "definicion": "Entidad que procesa datos personales en nombre del controlador. Sigue instrucciones del controlador. Responsabilidad compartida GDPR", "ejemplos": ["Cloud provider (AWS, Azure)", "Payroll service", "Email marketing platform", "Procesa datos segun instrucciones"], "prioridad": "MEDIA", "dominio": "D4"}, {"termino": "Data Controller (Controlador de Datos / Responsable del Tratamiento)", "definicion": "Entidad que determina propositos y medios de procesamiento de datos personales. Responsabilidad principal GDPR. Decide QUE y COMO", "ejemplos": ["Empresa que recopila datos clientes", "Hospital con datos pacientes", "Determina retencion y uso de datos"], "prioridad": "MEDIA", "dominio": "D4"}, {"termino": "RFID (Radio Frequency Identification)", "definicion": "Identificacion por radiofrecuencia. Etiquetas RFID almacenan datos. Lectura sin contacto. Tracking de objetos y acceso", "ejemplos": ["RFID access card", "Inventory tracking", "Passive RFID (sin bateria)", "Active RFID (con bateria)", "RFID cloning risk"], "prioridad": "MEDIA", "dominio": "D4"}, {"termino": "MAC (Mandatory Access Control)", "definicion": "Control de acceso obligatorio. Sistema operativo impone politica. Basado en clasificacion y clearance. Usado en entornos militares/gobierno", "ejemplos": ["SELinux", "Clearance: Top Secret, Secret", "Labels en objetos", "No discretion del usuario", "Bell-LaPadula model"], "prioridad": "MEDIA", "dominio": "D4"}, {"termino": "ABAC (Attribute-Based Access Control)", "definicion": "Control de acceso basado en atributos. Reglas granulares con multiples atributos: usuario, recurso, entorno. Muy flexible", "ejemplos": ["Acceso si: rol=manager AND dept=HR AND time=business_hours", "XACML", "Context-aware access", "Dynamic rules"], "prioridad": "MEDIA", "dominio": "D4"}, {"termino": "OVAL (Open Vulnerability and Assessment Language)", "definicion": "Lenguaje XML para automatizar evaluacion de vulnerabilidades. MITRE standard. Describe tests de seguridad", "ejemplos": ["OVAL definitions", "Vulnerability scanners usan OVAL", "XML format", "MITRE maintained", "Compliance checking"], "prioridad": "MEDIA", "dominio": "D5"}, {"termino": "COPE (Corporate Owned, Personally Enabled)", "definicion": "Empresa posee dispositivo, permite uso personal. Control corporativo + flexibilidad personal. Balance seguridad/usabilidad", "ejemplos": ["Empresa da iPhone, permite apps personales", "MDM managed", "Mas control que BYOD", "Empresa paga dispositivo"], "prioridad": "MEDIA", "dominio": "D5"}, {"termino": "CYOD (Choose Your Own Device)", "definicion": "Empleado elige de lista aprobada por empresa. Empresa posee y gestiona. Balance eleccion/control", "ejemplos": ["Elegir entre iPhone o Samsung aprobados", "Lista dispositivos certificados", "Empresa posee", "Estandarizacion parcial"], "prioridad": "MEDIA", "dominio": "D5"}, {"termino": "Risk Appetite", "definicion": "Cantidad de riesgo que organizacion esta dispuesta a aceptar. Nivel estrategico. Define limites de risk-taking. Guia decisiones de seguridad", "ejemplos": ["Startup tech: alto risk appetite (innovacion)", "Banco: bajo risk appetite (regulacion)", "Define threshold de aceptacion"], "prioridad": "MEDIA", "dominio": "D5"}, {"termino": "MOU (Memorandum of Understanding)", "definicion": "Documento de entendimiento mutuo. No legalmente vinculante. Intenciones y objetivos comunes. Menos formal que contrato", "ejemplos": ["MOU entre organizaciones para compartir threat intelligence", "Acuerdo colaboracion entre departamentos", "NO ejecutable legalmente"], "prioridad": "MEDIA", "dominio": "D5"}, {"termino": "MSA (Master Service Agreement)", "definicion": "Acuerdo marco de servicio. Contrato general que gobierna relacion. Terminos y condiciones base. SOWs especificos derivan de MSA", "ejemplos": ["MSA con proveedor IT", "Define terminos generales", "SOW individuales para proyectos", "Reduce negociacion repetitiva"], "prioridad": "MEDIA", "dominio": "D5"}, {"termino": "Journaling", "definicion": "Registro de cambios antes de aplicarlos. Filesystem journaling. Permite recuperacion tras crash. Integridad de datos", "ejemplos": ["ext4 journal", "NTFS journal", "Database transaction log", "Recuperacion consistente tras fallo"], "prioridad": "MEDIA", "dominio": "D5"}, {"termino": "PDU (Power Distribution Unit)", "definicion": "Unidad de distribucion electrica. Distribuye energia a equipos en rack. Inteligente (monitoreo) o basica. Redundancia de alimentacion", "ejemplos": ["PDU dual para redundancia", "Monitorizacion remota consumo", "Switched PDU (apagado remoto)", "PDU en rack datacenter"], "prioridad": "MEDIA", "dominio": "D5"}, {"termino": "Backup Generator", "definicion": "Generador electrico de respaldo. Arranca cuando falla alimentacion principal. Diesel/gas. Complementa UPS. Autonomia horas/dias", "ejemplos": ["Generador diesel 500kW", "Arranque automatico en 30 seg", "Tanque combustible 24h autonomia", "Testing mensual"], "prioridad": "MEDIA", "dominio": "D5"}, {"termino": "GPS (Global Positioning System)", "definicion": "Sistema posicionamiento global por satelite. Localizacion geografica. Geotagging, tracking. Privacy concerns", "ejemplos": ["Smartphone GPS", "Geofencing apps", "Location tracking", "Privacy risks", "Geotagging photos", "Find My iPhone"], "prioridad": "MEDIA", "dominio": "D5"}, {"termino": "MBR (Master Boot Record)", "definicion": "Primer sector disco (512 bytes). Info particiones + bootloader. Legacy (pre-UEFI). Vulnerable a bootkits", "ejemplos": ["Sector 0 del disco", "Bootloader legacy", "Max 4 particiones primarias", "Reemplazado por GPT/UEFI", "MBR rootkits"], "prioridad": "MEDIA", "dominio": "D5"}, {"termino": "CSO (Chief Security Officer)", "definicion": "Director de Seguridad. Ejecutivo responsable de seguridad fisica y ciberseguridad. Protege activos, datos, personas", "ejemplos": ["Oversee CISO + physical security", "Risk management", "Security strategy", "Reporta a CEO/COO", "C-level executive"], "prioridad": "MEDIA", "dominio": "D5"}, {"termino": "RTP (Real-time Transport Protocol)", "definicion": "Protocolo para entregar audio/video sobre redes IP. Tiempo real. VoIP, streaming. Usado con RTCP", "ejemplos": ["VoIP calls", "Video streaming", "WebRTC", "SRTP (secure RTP)", "UDP-based", "Usado con SIP"], "prioridad": "MEDIA", "dominio": "D5"}];
        let currentIndex = 0;
        let isFlipped = false;

        function loadCard(index) {
            const card = flashcards[index];
            const flashcardEl = document.getElementById('flashcard');

            // Reset flip
            if (isFlipped) {
                flashcardEl.classList.remove('flipped');
                isFlipped = false;
            }

            // Front
            document.getElementById('prioridad-front').textContent = card.prioridad;
            document.getElementById('prioridad-front').className = 'prioridad-badge prioridad-' + card.prioridad;
            document.getElementById('dominio-front').textContent = card.dominio;
            document.getElementById('termino').textContent = card.termino;

            // Back
            document.getElementById('prioridad-back').textContent = card.prioridad;
            document.getElementById('prioridad-back').className = 'prioridad-badge prioridad-' + card.prioridad;
            document.getElementById('dominio-back').textContent = card.dominio;
            document.getElementById('definicion').textContent = card.definicion;

            // Ejemplos
            const ejemplosContainer = document.getElementById('ejemplos-container');
            if (card.ejemplos && card.ejemplos.length > 0) {
                ejemplosContainer.innerHTML = '<h4>Ejemplos:</h4><ul>' +
                    card.ejemplos.map(ej => '<li>' + ej + '</li>').join('') +
                    '</ul>';
                ejemplosContainer.style.display = 'block';
            } else {
                ejemplosContainer.style.display = 'none';
            }

            // Progress
            document.getElementById('current').textContent = index + 1;
            document.getElementById('progress-fill').style.width = ((index + 1) / flashcards.length * 100) + '%';
        }

        function flipCard() {
            const flashcardEl = document.getElementById('flashcard');
            flashcardEl.classList.toggle('flipped');
            isFlipped = !isFlipped;
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % flashcards.length;
            loadCard(currentIndex);
        }

        function previousCard() {
            currentIndex = (currentIndex - 1 + flashcards.length) % flashcards.length;
            loadCard(currentIndex);
        }

        function randomCard() {
            currentIndex = Math.floor(Math.random() * flashcards.length);
            loadCard(currentIndex);
        }

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight') nextCard();
            else if (e.key === 'ArrowLeft') previousCard();
            else if (e.key === ' ') { e.preventDefault(); flipCard(); }
            else if (e.key === 'r' || e.key === 'R') randomCard();
        });

        // Load first card
        loadCard(0);
    </script>
</body>
</html>
